<style>

}
#nameBox h2 { color:#ffe066; font-size:15px; margin-bottom:8px; letter-spacing:2px; }
#nameBox p  { color:#888; font-size:12px; margin-bottom:18px; line-height:1.6; }
#nameInput {
  background:#000; color:#fff; border:2px solid #555;
  font-family:'Courier New',monospace; font-size:20px;
  width:100%; text-align:center; padding:9px;

}

#nameSubmit {
  display:block; margin:16px auto 0;
  background:#ffe066; color:#000;
  font-family:'Courier New',monospace; font-size:14px;
  border:none; padding:9px 30px; cursor:pointer;
  letter-spacing:2px; font-weight:bold;
}
#nameSubmit:hover { background:#fff; }
#nameError { color:#ff4444; font-size:12px; margin-top:10px; min-height:16px; }
/* ---- Virtual Keyboard ---- */
#vkb { margin-top:12px; }
.vkb-row { display:flex; justify-content:center; gap:3px; margin-bottom:3px; }
.vkb-key {
  background:#1e1e1e; border:1px solid #555; color:#fff;
  font-family:'Courier New',monospace; font-size:13px; font-weight:bold;
  width:29px; height:32px; cursor:pointer; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none; touch-action:manipulation;
  flex-shrink:0;
}
.vkb-key:active { background:#444; border-color:#fff; }
.vkb-key.k-back  { width:46px; font-size:15px; color:#ff8888; border-color:#884444; }
.vkb-key.k-space { flex:1; max-width:160px; font-size:11px; letter-spacing:2px; }
.vkb-key.k-confirm { flex:1; max-width:130px; background:#ffe066; color:#000; border-color:#ffe066; font-size:11px; letter-spacing:1px; }
.vkb-key.k-sym { color:#aaa; }
/* ---- On-screen controls ---- */
#controls {
  display:flex; gap:18px; margin-top:10px; margin-bottom:6px;
  align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none;
}
#dpad {
  display:grid;
  grid-template-columns:repeat(3,54px);
  grid-template-rows:repeat(2,54px);
  gap:5px;
}
.dpbtn {
  background:rgba(255,255,255,0.10);
  border:2px solid #444; color:#ccc;
  font-size:24px; border-radius:10px;
  cursor:pointer; touch-action:none;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.05s;
}
.dpbtn:active, .dpbtn.held { background:rgba(255,255,255,0.32); border-color:#aaa; }
.dpbtn.mid { background:transparent; border:none; pointer-events:none; }
#actbtns { display:flex; flex-direction:column; gap:7px; }
.abtn {
  background:rgba(255,255,255,0.10);
  border:2px solid #555; color:#fff;
  font-size:13px; font-family:'Courier New',monospace;
  border-radius:10px; cursor:pointer;
  padding:11px 22px; touch-action:none;
  transition:background 0.05s; white-space:nowrap;
}
.abtn:active, .abtn.held { background:rgba(255,255,255,0.32); }
.zbtn { border-color:#ff5555; color:#ff5555; }
.xbtn { border-color:#5588ff; color:#8aadff; }
.rbtn { border-color:#44bb44; color:#88dd88; }
@media (min-width:640px) {
  #controls { display:none; }
  #info { display:block; }
}
@media (max-width:639px) {

// ---- AUDIO --------------------------------------------------------
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq, dur, type='square', vol=0.13) {
  try {
    const o = ac().createOscillator(), g = ac().createGain();
    o.connect(g); g.connect(ac().destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac().currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac().currentTime + dur);
    o.start(); o.stop(ac().currentTime + dur);
  } catch(e) {}
}
function sfxSelect()  { tone(550, 0.07); }
function sfxConfirm() { tone(880,0.08); setTimeout(()=>tone(1100,0.1),80); }
function sfxHit()     { tone(160,0.18,'sawtooth',0.25); }
function sfxDie()     { [200,160,120,80].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sawtooth',0.25),i*160)); }
function sfxWin()     { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.28,'square',0.15),i*190)); }
function sfxBoom()    { tone(70,0.5,'sawtooth',0.3); }
function sfxDeny()    { tone(200,0.2,'square',0.1); }

// ---- SAVE / LOAD --------------------------------------------------
const SAVE_KEY = 'bossGauntlet_v1';
const NAME_KEY  = 'bg_username';
const FB = 'https://bossgaunlet-default-rtdb.firebaseio.com';

function saveGame() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ ul: gs.unlocked, bt: gs.beaten }));
}
function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      gs.unlocked = d.ul; gs.beaten = d.bt;
      while(gs.unlocked.length < 9) gs.unlocked.push(false);
      while(gs.beaten.length < 9)   gs.beaten.push(false);
    }
  } catch(e) {}
  gs.username = localStorage.getItem(NAME_KEY) || '';
}

// ---- FIREBASE LEADERBOARD ----------------------------------------
async function fbGet(path) {
  try {
    const r = await fetch(`${FB}/${path}.json`);
    const d = await r.json();
    if (!d) return [];
    return Array.isArray(d) ? d : Object.values(d);
  } catch(e) { return []; }
}
async function fbSet(path, arr) {
  try {
    await fetch(`${FB}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(arr)
    });
  } catch(e) {}
}

async function submitScore() {
  const name   = gs.username;
  const boss   = gs.maxBossReached;
  const beaten = gs.beaten.filter(b=>b).length;
  gs.maxBossReached = -1;
  if (!name || boss < 0) return;

  const date = new Date().toLocaleDateString();

  const [lbQ, lbB] = await Promise.all([fbGet('lb_q'), fbGet('lb_b')]);

  lbQ.push({ n: name, s: beaten, d: date });
  lbQ.sort((a, b) => b.s - a.s);
  lbQ.splice(100);

  lbB.push({ n: name, b: boss, d: date });
  lbB.sort((a, b) => b.b - a.b);
  lbB.splice(100);

  await Promise.all([fbSet('lb_q', lbQ), fbSet('lb_b', lbB)]);

  gs.lbCache  = { q: lbQ.slice(0, 10), b: lbB.slice(0, 10) };
  gs.lbLoaded = true;
  gs.lbLoading = false;
}

// ---- GAME STATE ---------------------------------------------------
const gs = {
  state: 'title',   // title|select|cutscene|enemy|player|slider|result|dead|boss_dead|fakedie|win
  frame: 0,
  bossIdx: 0,
  unlocked: [true,false,false,false,false,false,false,false,false],
  beaten:   [false,false,false,false,false,false,false,false,false],

  boss: null,
  bossHP: 0, bossHP2: 0,
  bossPhase: 0,
  fakeDied: false,

  px: 300, py: 255,
  php: 100, pMaxHP: 100,
  items: 5,

  box: { x:175, y:175, w:250, h:160 },

  attackName: '',
  attackTimer: 0,
  spawnTimer: 0,
  invTimer: 0,
  projs: [],

  menuSel: 0,

  // Slider
  sliderX: 0.5, sliderDir: 1, sliderSpd: 0,
  sliderLocked: false, sliderShowTimer: 0,
  sliderDamage: 0,

  // Dialogue
  dLines: [], dLine: 0, dTimer: 0, dCB: null,

  // Effects
  shakeX: 0, shakeY: 0, flashA: 0,

  // Troll effects
  reversed: false, invisible: false,

  // Result
  resultDmg: 0, resultTimer: 0,

  deathTimer: 0,

  // Misc
  memPos: [],

  // Player identity & scoring
  username: '',
  maxBossReached: -1,  // highest bossIdx attempted this run
  flashbangTimer: 0,   // frames remaining of flashbang blindness
  titleSel: 0,         // 0=PLAY 1=LEADERBOARD 2=CHANGE NAME

  // Leaderboard cache (populated async from Firebase)

  lbLoading: false,
  lbLoaded:  false,
};

// ---- INPUT --------------------------------------------------------
const keys = {}, jp = {}, jpu = {};
window.addEventListener('keydown', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return; // let inputs type normally
  if (!keys[e.code]) jp[e.code]=true; keys[e.code]=true; e.preventDefault();
});
window.addEventListener('keyup',   e => { keys[e.code]=false; jpu[e.code]=true; });
function clearJP() { for (const k in jp) delete jp[k]; for (const k in jpu) delete jpu[k]; }
const dn  = (a,b) => keys[a]||(b&&keys[b]);
const hit = (a,b) => jp[a]||(b&&jp[b]);

// ---- DRAW UTILS ---------------------------------------------------
function fr(x,y,w,h,c)      { cx.fillStyle=c; cx.fillRect(x,y,w,h); }
function sr(x,y,w,h,c,lw=1) { cx.strokeStyle=c; cx.lineWidth=lw; cx.strokeRect(x,y,w,h); }
function tx(s,x,y,c='#fff',sz=14,al='left') {
  cx.fillStyle=c; cx.font=`${sz}px 'Courier New',monospace`; cx.textAlign=al; cx.fillText(s,x,y);
}
function shake(a) { gs.shakeX=(Math.random()-0.5)*a*2; gs.shakeY=(Math.random()-0.5)*a*2; }
function flash(a) { gs.flashA=Math.max(gs.flashA,a); }

// ---- BOSS SPRITES (procedural) ------------------------------------
function drawSprite(boss, sx, sy, sc=1) {
  cx.save();
  cx.translate(sx, sy);
  cx.scale(sc, sc);
  const t = gs.frame;
  const bob = Math.sin(t*0.05)*3;
  cx.translate(0, bob);
  const invFlick = gs.invTimer>0 && Math.floor(t/3)%2===0;
  if (!invFlick) _sprite(boss);
  cx.restore();
}

function _sprite(b) {
  const c = b.color, e = b.ec, t = gs.frame;
  switch(b.id) {
    case 'sans': case 'double':
      fr(-28,-38,56,42,c); fr(-22,4,44,28,c);        // head+body
      cx.fillStyle=e; _arc(-10,-18,9); _arc(10,-18,9); // eyes
      fr(-18,-4,36,5,'#000');                           // mouth
      break;
    case 'toriel': case 'dstory':
      fr(-22,-42,44,48,c);                             // body
      cx.fillStyle=c;
      _tri(-22,-42,-34,-64,-10,-42); _tri(22,-42,34,-64,10,-42); // horns
      cx.fillStyle=e; _arc(-8,-22,7); _arc(8,-22,7);
      fr(-16,-6,32,5,'#333');
      break;
    case 'troll':
      cx.fillStyle=c; _arc(0,-8,32);                   // round face
      cx.fillStyle='#000'; _arc(-12,-16,6); _arc(12,-16,6);
      cx.fillStyle=e; _arc(-12,-16,3); _arc(12,-16,3);
      cx.strokeStyle='#000'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(0,-2,14,0.2,Math.PI-0.2); cx.stroke();
      break;
    case 'chara':
      fr(-20,-44,40,50,'#800000');
      cx.fillStyle=e; _arc(-8,-22,8); _arc(8,-22,8);
      cx.fillStyle='#ff0000'; _arc(-8,-22,5); _arc(8,-22,5);
      // knife
      cx.fillStyle='#cccccc';
      cx.beginPath(); cx.moveTo(22,6); cx.lineTo(38,-32); cx.lineTo(40,-30); cx.lineTo(24,8); cx.fill();
      break;
    case 'mark':
      cx.fillStyle='#f4a460'; _arc(0,-14,30);           // face
      fr(-30,-46,60,22,'#3a1a00');                       // hair
      cx.fillStyle='#000'; _arc(-10,-16,7); _arc(10,-16,7);
      cx.fillStyle=e; _arc(-10,-16,4); _arc(10,-16,4);
      cx.strokeStyle='#ff2200'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(0,0,16,0.15,Math.PI-0.15); cx.stroke();
      break;
    case 'final': {
      const hue = (t*2)%360;
      for (let i=0;i<8;i++) {
        const a=(i/8)*Math.PI*2+t*0.025, r=42;
        cx.fillStyle=`hsl(${(i*45+t)%360},100%,55%)`;
        _arc(Math.cos(a)*r*0.32, Math.sin(a)*r*0.32-8, 11);
      }
      cx.fillStyle=`hsl(${hue},80%,60%)`; _arc(0,-10,22);
      cx.fillStyle=b.ec; _arc(-9,-15,7); _arc(9,-15,7);
      break;
    }
    default:
      cx.fillStyle=c; _arc(0,-10,30);
      cx.fillStyle=e; _arc(-10,-16,8); _arc(10,-16,8);
      fr(-15,-4,30,5,'#000');
  }
}
function _arc(x,y,r) { cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); }
function _tri(x1,y1,x2,y2,x3,y3) { cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.lineTo(x3,y3); cx.closePath(); cx.fill(); }

// ---- PROJECTILE SYSTEM -------------------------------------------
function addP(type,x,y,vx,vy,extra) {
  if (gs.projs.length>600) gs.projs.shift();
  gs.projs.push({ type, x, y, vx, vy, life:0, dead:false, ...extra });
}

function updateProjs() {
  const box = gs.box;
  const np = [];
  for (const p of gs.projs) {
    p.x += p.vx; p.y += p.vy; p.life++;
    if (p.upd) p.upd(p);

    // Player collision (only in enemy state, not invincible)
    if (gs.state==='enemy' && gs.invTimer<=0 && !p.dead && p.type!=='fake') {
      const dx=gs.px-p.x, dy=gs.py-p.y;
      let hit=false;
      if (p.type==='bone'||p.type==='bone_blue') {
        const hw=Math.abs(p.bw)/2, hh=Math.abs(p.bh)/2;
        const ax=Math.abs(dx), ay=Math.abs(dy);
        hit = ax<hw+5 && ay<hh+5;
      } else {
        const r=p.r||5;
        hit = dx*dx+dy*dy < (r+5)*(r+5);
      }
      if (hit) {
        if (p.type==='bone_blue') {
          const mv = dn('ArrowLeft','KeyA')||dn('ArrowRight','KeyD')||dn('ArrowUp','KeyW')||dn('ArrowDown','KeyS');
          if (mv) { takeDmg(p.dmg||bossDmg()); p.dead=true; }
        } else {
          takeDmg(p.dmg||bossDmg()); p.dead=true;
        }
      }
    }

    const vis = p.x>-120&&p.x<W+120&&p.y>-120&&p.y<H+120;
    if (vis && !p.dead && p.life<(p.maxL||9999)) np.push(p);
  }
  gs.projs = np;
}

function drawProjs() {
  for (const p of gs.projs) {
    cx.save();
    cx.globalAlpha = p.alpha||1;
    if (p.type==='bone'||p.type==='bone_blue') {
      cx.fillStyle = p.type==='bone_blue' ? '#4499ff' : '#ffffff';
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.ang||0);
      cx.fillRect(-p.bw/2,-p.bh/2,p.bw,p.bh); cx.restore();
    } else if (p.type==='blaster') {
      cx.fillStyle=p.col||'#00ffff'; cx.shadowBlur=14; cx.shadowColor=p.col||'#00ffff';
      _arc2(p.x,p.y,p.r||8);
    } else if (p.type==='bullet') {
      cx.fillStyle=p.col||'#ff8800'; _arc2(p.x,p.y,p.r||5);
    } else if (p.type==='ring') {
      cx.strokeStyle=p.col||'#ff0088'; cx.lineWidth=4; cx.shadowBlur=8; cx.shadowColor=p.col;
      cx.beginPath(); cx.arc(p.x,p.y,p.r||10,0,Math.PI*2); cx.stroke();
    } else if (p.type==='fake') {
      cx.fillStyle='#666'; cx.globalAlpha=0.35; _arc2(p.x,p.y,p.r||5);
    } else if (p.type==='laser') {
      cx.fillStyle=p.col||'#ff0000'; cx.globalAlpha=0.75; cx.fillRect(p.x,p.y,p.bw||8,p.bh||H);
    }
    cx.restore();
  }
}
function _arc2(x,y,r) { cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); }

function bossDmg() {
  const [mn,mx]=gs.boss.atk; return Math.floor(mn+Math.random()*(mx-mn));
}
function takeDmg(d) {
  gs.php = Math.max(0, gs.php-d);
  gs.invTimer = 55; shake(4); flash(0.25); sfxHit();
  if (gs.php<=0) { gs.state='dead'; gs.deathTimer=200; sfxDie(); }
}

// ---- SPAWN HELPERS -----------------------------------------------
function bx() { return gs.box.x; } function by_() { return gs.box.y; }
function bw() { return gs.box.w; } function bh_() { return gs.box.h; }
function bcx(){ return bx()+bw()/2; } function bcy(){ return by_()+bh_()/2; }
function randBY() { return by_()+Math.random()*bh_(); }
function randBX() { return bx()+Math.random()*bw(); }
function randSide() {
  const s=Math.floor(Math.random()*4);
  if(s===0) return [bx()-20, randBY()];
  if(s===1) return [bx()+bw()+20, randBY()];
  if(s===2) return [randBX(), by_()-20];
  return [randBX(), by_()+bh_()+20];
}
function aimAt(sx,sy,spd) {
  const dx=gs.px-sx, dy=gs.py-sy, d=Math.sqrt(dx*dx+dy*dy)||1;
  return [(dx/d)*spd,(dy/d)*spd];
}

function spawnBone(y, dir, spd, boneW, boneH, col) {
  const sx = dir<0 ? bx()+bw()+20 : bx()-20;
  addP('bone',sx,y,spd*dir,0,{bw:boneW||80,bh:boneH||13,col});
}
function spawnVBone(x, dir, spd) {
  const sy = dir<0 ? by_()+bh_()+20 : by_()-20;
  addP('bone',x,sy,0,spd*dir,{bw:13,bh:70});
}
function spawnBlaster(sx,sy,vx,vy) {
  addP('blaster',sx,sy,vx,vy,{r:8,col:'#00ffff'});
}
function spawnAimedBlaster(sx,sy,spd,col) {
  const [vx,vy]=aimAt(sx,sy,spd);
  addP('blaster',sx,sy,vx,vy,{r:7,col:col||'#00ffff'});
}
function spawnBullet(sx,sy,vx,vy,r,col,dmg) {
  addP('bullet',sx,sy,vx,vy,{r:r||5,col:col||'#ff8800',dmg:dmg||bossDmg()});
}
function spawnRing(x,y,growSpd,col,maxR) {
  let p={type:'ring',x,y,vx:0,vy:0,r:8,col:col||'#ff0088',life:0};
  p.upd = q => { q.r += growSpd||1.8; if(q.r>(maxR||110)) q.dead=true; };
  gs.projs.push(p);
}
function spawnHomingBullet(sx,sy,spd,col,homeStr) {
  let p={type:'bullet',x:sx,y:sy,vx:0,vy:spd,r:8,col:col||'#ff88ff',life:0};
  p.upd = q => {
    const dx=gs.px-q.x, dy=gs.py-q.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    q.vx += (dx/d)*(homeStr||1.2);
    q.vy += (dy/d)*(homeStr||1.2);
    const s=Math.sqrt(q.vx*q.vx+q.vy*q.vy), max=spd*1.8||3;
    if(s>max){q.vx*=max/s;q.vy*=max/s;}
  };
  gs.projs.push(p);
}

      spawnBone(y, Math.random()<0.5?1:-1, spd);
    }
    for(let i=0;i<4+p;i++){
      spawnVBone(bx()+15+Math.random()*(bw()-30), Math.random()<0.5?1:-1, spd);
    }
  },
  s15_circle() {
    // Ring of blasters contracting toward the center
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(20, 45-ph()*5);
    const count=8+ph()*2, spd=2.5+ph()*0.4;
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2;
      const r=bw()*0.7+20;
      const sx=bcx()+Math.cos(a)*r, sy=bcy()+Math.sin(a)*r;
      const [vx,vy]=aimAt(sx,sy,spd);
      addP('blaster',sx,sy,vx,vy,{r:8,col:`hsl(${i*(360/count)},100%,60%)`});
    }
  },
  s15_wave() {
    // Sine-wave bones from left; counter-wave from right in phase 2+
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(4, 10-ph());
    const p=ph(), t=gs.frame*0.12, amp=28+p*6, spd=2.5+p*0.4;
    const y1=bcy()+Math.sin(t)*amp;
    spawnBone(y1, 1, spd);
    if(p>=2){
      const y2=bcy()+Math.sin(t+Math.PI)*amp;
      spawnBone(y2, -1, spd);
    }
    if(p>=4){
      const y3=bcy()+Math.sin(t+Math.PI/2)*amp;
      spawnVBone(bx()+bw()/2+Math.sin(t)*40, 1, spd*0.8);
    }
  },
  s15_gatling() {
    // Rapid fire from all 4 sides cycling quickly
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(3, 8-ph());
    const p=ph(), spd=3+p*0.5, side=Math.floor(gs.frame/4)%4;
    if(side===0) spawnBone(randBY(),1,spd);
    else if(side===1) spawnBone(randBY(),-1,spd);
    else if(side===2) spawnVBone(randBX(),1,spd);
    else spawnVBone(randBX(),-1,spd);
    if(p>=3){ // Additional blasters at high phase
      if(Math.random()<0.3) spawnAimedBlaster(...randSide(),3+p*0.4,'#ff8800');
    }
  },
  s15_wall() {
    // Full bone wall from left/right with exactly one random gap
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(24, 50-ph()*5);
    const p=ph(), rows=7+Math.floor(p/2), gapRow=Math.floor(Math.random()*rows);
    const spd=2.5+p*0.4, dir=Math.random()<0.5?1:-1;
    for(let i=0;i<rows;i++){
      if(i===gapRow) continue;
      const y=by_()+(i/(rows-1))*bh_();
      spawnBone(y, dir, spd);
    }
  },
  s15_spiral() {
    // 3-arm bone spiral rotating from center
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(5, 12-ph()*1.5);
    const p=ph(), arms=3+Math.floor(p/3), spd=3+p*0.5, t=gs.frame*0.08;
    for(let i=0;i<arms;i++){
      const a=t+(i/arms)*Math.PI*2;
      const dist=bw()*0.45;
      const sx=bcx()+Math.cos(a)*dist, sy=bcy()+Math.sin(a)*dist;
      addP('bone',sx,sy,Math.cos(a)*spd,Math.sin(a)*spd,{bw:66,bh:10,ang:a});
    }
  },
  s15_chaos() {
    // Random mix of multiple attacks simultaneously
    shake(Math.random()*7);
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = Math.max(5, 14-ph()*2);
    const picks=['s15_bones','s15_rain','s15_flung','s15_gatling','s15_wave','s15_diagonal'];
    const chosen=picks[Math.floor(Math.random()*picks.length)];
    const prevT=gs.spawnTimer;
    AT[chosen]();
    gs.spawnTimer=prevT;
    if(ph()>=4 && Math.random()<0.4) {
      AT.s15_blasters(); gs.spawnTimer=prevT;
    }
    if(ph()>=5 && Math.random()<0.3) {
      spawnRing(bcx(),bcy(),3,'#ff00ff');
    }
  },
  s15_finale() {
    // Phase 6 (index 5) only — EVERYTHING simultaneously, constant shake+flash
    shake(10+Math.random()*6);
    if(gs.frame%20===0) flash(0.6);
    gs.spawnTimer--;
    if(gs.spawnTimer>0) return;
    gs.spawnTimer = 2;
    // Bones from all sides
    spawnBone(randBY(),1,5+Math.random());
    spawnBone(randBY(),-1,5+Math.random());
    spawnVBone(randBX(),1,4+Math.random());
    spawnVBone(randBX(),-1,4+Math.random());
    // Aimed blasters
    if(gs.frame%10===0) spawnAimedBlaster(...randSide(),5,'#ff00ff');
    // Ring bursts every 2s
    if(gs.frame%120===0) spawnRing(bcx(),bcy(),4,'#ffffff');
    // Diagonal bones
    const a=gs.frame*0.06;
    addP('bone',bcx()+Math.cos(a)*90,bcy()+Math.sin(a)*90,Math.cos(a)*4,Math.sin(a)*4,{bw:60,bh:9,ang:a});
    // Spiral blasters
    if(gs.frame%8===0){
      const a2=gs.frame*0.09+Math.PI;
      addP('blaster',bcx()+Math.cos(a2)*70,bcy()+Math.sin(a2)*70,
           Math.cos(a2)*4,Math.sin(a2)*4,{r:7,col:'#00ffff'});
    }
    // Occasional flashbang
    if(gs.frame%240===0) { gs.flashbangTimer=60; shake(15); }
  }
};

// ---- GAME LOGIC -------------------------------------------------
function startFight(idx) {
  if(!gs.unlocked[idx]) return;
  gs.maxBossReached = Math.max(gs.maxBossReached, idx);
  const boss=BOSSES[idx];
  gs.bossIdx=idx; gs.boss=boss;
  gs.bossHP=boss.hp; gs.bossHP2=boss.hp2||0;
  gs.bossPhase=0; gs.fakeDied=false;
  gs.projs=[]; gs.php=100; gs.items=5; gs.invTimer=0;
  gs.reversed=false; gs.invisible=false;
  gs.menuSel=0; gs.memPos=[]; gs.flashbangTimer=0;
  gs.shakeX=0; gs.shakeY=0; gs.flashA=0;
  gs.fakeDieTimer=0;
  const box=gs.box; gs.px=box.x+box.w/2; gs.py=box.y+box.h/2;
  dialogue(boss.ds||['* ...'], startEnemyTurn);
}

function startEnemyTurn() {
  gs.state='enemy';
  gs.reversed=false; gs.invisible=false; gs.projs=[]; gs.spawnTimer=0;
  const boss=gs.boss, n=boss.atks.length;
  const avail=boss.atks.slice(0,Math.min(n,1+gs.bossPhase*2+1));
  gs.attackName=avail[Math.floor(Math.random()*avail.length)];
  gs.attackTimer=180+gs.bossIdx*28+gs.bossPhase*45;
}

function startPlayerTurn() {
  gs.state='player'; gs.reversed=false; gs.invisible=false; gs.projs=[];
  gs.menuSel=0;
  const box=gs.box; gs.px=box.x+box.w/2; gs.py=box.y+box.h/2;
}

function startSlider() {
  gs.state='slider';
  gs.sliderX=0; gs.sliderDir=1;
  gs.sliderSpd=1.4+gs.bossIdx*0.35+gs.bossPhase*0.45;
  gs.sliderLocked=false; gs.sliderShowTimer=0;
}

function confirmSlider() {
  gs.sliderLocked=true;
  gs.sliderShowTimer=50;
  const acc=1-Math.abs(gs.sliderX-0.5)*2;
  const base=[80,70,90,100,120,130,150,800,1500][gs.bossIdx]||80;
  gs.sliderDamage=Math.floor(base*(0.25+acc*1.75));
  sfxConfirm();
}

function applySliderDamage() {
  dealDamageToBoss(gs.sliderDamage);
  gs.resultDmg=gs.sliderDamage; gs.resultTimer=80;
  if(gs.state!=='boss_dead'&&gs.state!=='cutscene'&&gs.state!=='fakedie')
    gs.state='result';
}

function dealDamageToBoss(dmg) {
  const boss=gs.boss;
  if(boss.isDouble&&gs.bossHP2>0){
    if(Math.random()<0.5) gs.bossHP=Math.max(0,gs.bossHP-dmg);
    else gs.bossHP2=Math.max(0,gs.bossHP2-dmg);
  } else {
    gs.bossHP=Math.max(0,gs.bossHP-dmg);
  }
  // Update phase
  const f=gs.bossHP/boss.hp, th=boss.phases||[];
  let nph=0;
  for(let i=0;i<th.length;i++) if(f<=th[i]) nph=i+1;
  if(nph>gs.bossPhase){ gs.bossPhase=nph; shake(12); flash(0.6); sfxBoom(); }
  else { shake(4); flash(0.15); }

  // Fake die check
  if(boss.hasFakeDie&&!gs.fakeDied&&(gs.bossHP/boss.hp)<=(boss.fakeHP||0.5)){
    gs.fakeDied=true;
    gs.bossHP=boss.hp; // RESET
    gs.bossPhase=Math.max(1,th.length);
    dialogue(boss.df||['* psych!'], startEnemyTurn);
    return;
  }

  const total=boss.isDouble?(gs.bossHP+gs.bossHP2):gs.bossHP;
  if(total<=0){
    gs.beaten[gs.bossIdx]=true;
    if(gs.bossIdx+1<BOSSES.length) gs.unlocked[gs.bossIdx+1]=true;
    saveGame();
    gs.state='boss_dead'; gs.dLine=0; gs.dTimer=0;
    sfxWin();
  }
}

function updTitle() {
  const n = 3; // PLAY / LEADERBOARD / CHANGE NAME
  if(hit('ArrowUp','KeyW'))   { gs.titleSel=(gs.titleSel-1+n)%n; sfxSelect(); }
  if(hit('ArrowDown','KeyS')) { gs.titleSel=(gs.titleSel+1)%n;   sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')) {
    sfxConfirm();
    if(gs.titleSel===0) {
      // Reset run stats when starting fresh
      gs.maxBossReached=-1;
      gs.state='select'; gs.menuSel=0;
    } else if(gs.titleSel===1) {
      enterLeaderboard();
    } else {
      showNameOverlay();
    }
  }
}
function enterLeaderboard() {
  gs.state = 'leaderboard';
  gs.lbLoading = true;
  gs.lbLoaded  = false;
  gs.lbCache   = { q: [], b: [] };
  Promise.all([fbGet('lb_q'), fbGet('lb_b')]).then(([q, b]) => {
    gs.lbCache   = { q: q.slice(0,10), b: b.slice(0,10) };
    gs.lbLoading = false;
    gs.lbLoaded  = true;
  }).catch(() => {
    gs.lbLoading = false;
    gs.lbLoaded  = true;
  });
}
function updLeaderboard() {
  if(hit('KeyZ','Enter')||hit('Space')||hit('KeyX','Escape')) { gs.state='title'; }
}
function updSelect() {
  if(hit('ArrowUp','KeyW')){ gs.menuSel=Math.max(0,gs.menuSel-1); sfxSelect(); }
  if(hit('ArrowDown','KeyS')){ gs.menuSel=Math.min(8,gs.menuSel+1); sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')){
    if(gs.unlocked[gs.menuSel]){ sfxConfirm(); startFight(gs.menuSel); }
    else sfxDeny();
  }
  if(hit('KeyX','Escape')){ gs.state='title'; }
}
function updCutscene() {
  gs.dTimer++;
  const line=gs.dLines[gs.dLine]||'';
  const shown=Math.min(line.length,Math.floor(gs.dTimer/1.4));
  if(hit('KeyZ','Enter')||hit('Space')){
    if(shown<line.length){ gs.dTimer=line.length*1.5+5; }
    else {
      gs.dLine++;
      gs.dTimer=0;
      if(gs.dLine>=gs.dLines.length){
        const cb=gs.dCB; gs.dCB=null;
        if(cb) cb();
      } else tone(440,0.04,'square',0.05);
    }
  }
}
function updEnemy() {
  const box=gs.box, spd=3.1;
  let dx=0,dy=0;
  if(dn('ArrowLeft','KeyA'))  dx-=spd;
  if(dn('ArrowRight','KeyD')) dx+=spd;
  if(dn('ArrowUp','KeyW'))    dy-=spd;
  if(dn('ArrowDown','KeyS'))  dy+=spd;
  if(gs.reversed){dx=-dx;dy=-dy;}
  gs.px=Math.max(box.x+5,Math.min(box.x+box.w-5,gs.px+dx));
  gs.py=Math.max(box.y+5,Math.min(box.y+box.h-5,gs.py+dy));
  if(gs.invTimer>0) gs.invTimer--;
  if(gs.flashbangTimer>0){ gs.flashbangTimer--; gs.flashA=1.0; }
  const atk=AT[gs.attackName]; if(atk) atk();
  updateProjs();
  gs.shakeX*=0.75; gs.shakeY*=0.75;
  if(gs.flashbangTimer<=0&&gs.flashA>0) gs.flashA=Math.max(0,gs.flashA-0.025);
  gs.attackTimer--;
  if(gs.attackTimer<=0) startPlayerTurn();
}
function updPlayer() {
  if(hit('ArrowLeft','KeyA')||hit('ArrowUp','KeyW')){ gs.menuSel=(gs.menuSel-1+4)%4; sfxSelect(); }
  if(hit('ArrowRight','KeyD')||hit('ArrowDown','KeyS')){ gs.menuSel=(gs.menuSel+1)%4; sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')){
    sfxConfirm();
    if(gs.menuSel===0){ startSlider(); }
    else if(gs.menuSel===1){ dialogue(['* You try talking.','* ...','* They aren\'t interested.'],startEnemyTurn); }
    else if(gs.menuSel===2){
      if(gs.items>0){
        gs.items--; gs.php=Math.min(gs.pMaxHP,gs.php+30);
        dialogue([`* You used a healing item! (+30 HP)`,`* HP: ${gs.php}/${gs.pMaxHP}`],startEnemyTurn);
      } else dialogue(['* No items left!'],startEnemyTurn);
    } else { dialogue(['* You offer mercy.','* The enemy ignores you.'],startEnemyTurn); }
  }
}
function updSlider() {
  if(!gs.sliderLocked){
    gs.sliderX+=gs.sliderDir*(gs.sliderSpd/60);
    if(gs.sliderX>=1){gs.sliderX=1;gs.sliderDir=-1;}
    if(gs.sliderX<=0){gs.sliderX=0;gs.sliderDir=1;}
    if(hit('KeyZ','Enter')||hit('Space')) confirmSlider();
  } else {
    gs.sliderShowTimer--;
    if(gs.sliderShowTimer<=0) applySliderDamage();
  }
}
function updResult() {
  gs.resultTimer--;
  if(gs.resultTimer<=0||(hit('KeyZ','Enter')||hit('Space'))){
    const total=gs.boss.isDouble?(gs.bossHP+gs.bossHP2):gs.bossHP;
    if(total>0) startEnemyTurn();
  }
}
function updBossDead() {
  gs.dTimer++;
  const lines=gs.boss.dw||['* ...'];
  const line=lines[gs.dLine]||'';
  const shown=Math.min(line.length,Math.floor(gs.dTimer/1.4));
  if(hit('KeyZ','Enter')||hit('Space')){
    if(shown<line.length){ gs.dTimer=line.length*2; }
    else if(gs.dLine<lines.length-1){ gs.dLine++; gs.dTimer=0; }
    else {
      if(gs.beaten.every(b=>b)){ gs.state='win'; sfxWin(); }
      else { gs.state='select'; gs.menuSel=0; }
    }
  }
}
function updDead() {
  gs.deathTimer--;
  gs.shakeX*=0.9; gs.shakeY*=0.9; gs.flashA=Math.max(0,gs.flashA-0.02);
  if(hit('KeyR')){ startFight(gs.bossIdx); return; }
  if(gs.deathTimer<80&&(hit('KeyZ','Enter')||hit('Space'))){ submitScore(); gs.state='select'; gs.menuSel=gs.bossIdx; }
  if(gs.deathTimer<80&&hit('Escape','KeyX')){ submitScore(); gs.state='title'; }
}
function updWin() {
  if(hit('KeyZ','Enter')||hit('Space')||hit('Escape','KeyX')){
    submitScore();
    gs.state='title';
  }
}

      tx('—',lx+pw/2,ey+25,'#333',11,'center');
    }
  }

  // Right panel — Furthest Boss
  fr(rx,py_,pw,22,'#1a1a1a'); sr(rx,py_,pw,22,'#555',1);
  tx('FURTHEST BOSS REACHED',rx+pw/2,py_+15,'#ff8844',11,'center');

  for(let i=0;i<10;i++){
    const e=lbB[i];
    const ey=py_+24+i*rh;
    const bg=i%2===0?'#080808':'#0d0d0d';
    fr(rx,ey,pw,rh-2,bg);
    if(e){
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      const nc=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#ccc';
      tx(medal,       rx+4,  ey+25, nc,     12);
      const nm=e.n.length>13?e.n.substring(0,12)+'…':e.n;
      tx(nm,          rx+38, ey+25,'#fff',  12);
      const bn=e.b>=0?(e.b===8?'ALL DONE!':'Boss '+(e.b+1)+': '+bossNames[e.b]):'—';
      const bc=e.b===8?'#ffd700':e.b>=6?'#ff4444':e.b>=3?'#ff8800':'#aaa';
      tx(bn,          rx+pw-6,ey+25,bc,11,'right');
    } else {
      tx('—',rx+pw/2,ey+25,'#333',11,'center');
    }
  }

  tx('Z / Enter / Esc — Back to title',W/2,H-10,'#444',11,'center');
}

// ---- MAIN LOOP --------------------------------------------------
function update() {
  gs.frame++;
  switch(gs.state){
    case 'title':       updTitle();       break;
    case 'leaderboard': updLeaderboard(); break;
    case 'select':      updSelect();      break;
    case 'cutscene': updCutscene(); break;
    case 'enemy':    updEnemy();    break;
    case 'player':   updPlayer();   break;
    case 'slider':   updSlider();   break;
    case 'result':   updResult();   break;
    case 'boss_dead':updBossDead(); break;
    case 'dead':     updDead();     break;
    case 'win':      updWin();      break;
  }
  clearJP();
}

function draw() {
  cx.clearRect(0,0,W,H);
  cx.save();
  if(gs.state==='enemy'||gs.state==='player'||gs.state==='dead')
    cx.translate(gs.shakeX,gs.shakeY);
  switch(gs.state){
    case 'title':       drawTitle();       break;
    case 'leaderboard': drawLeaderboard(); break;
    case 'select':      drawSelect();      break;
    case 'cutscene': drawCutscene(); break;
    case 'enemy':    drawBattle();   break;
    case 'player':   drawBattle();   break;
    case 'slider':   drawSlider();   break;
    case 'result':   drawResult();   break;
    case 'boss_dead':drawBossDead(); break;
    case 'dead':     drawDead();     break;
    case 'win':      drawWin();      break;
  }
  if(gs.flashA>0){ cx.fillStyle=`rgba(255,255,255,${gs.flashA})`; cx.fillRect(0,0,W,H); }
  cx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ---- MOBILE / TOUCH CONTROLS ------------------------------------
// On-screen buttons → same keys/jp as keyboard
document.querySelectorAll('[data-key]').forEach(btn => {
  const code = btn.dataset.key;
  function press(e) {
    e.preventDefault();
    if (!keys[code]) jp[code] = true;
    keys[code] = true;
    btn.classList.add('held');
  }
  function release(e) {
    if (e) e.preventDefault();
    keys[code] = false;
    btn.classList.remove('held');
  }
  btn.addEventListener('mousedown',  press,   {passive:false});
  btn.addEventListener('mouseup',    release, {passive:false});
  btn.addEventListener('mouseleave', release, {passive:false});
  btn.addEventListener('touchstart', press,   {passive:false});
  btn.addEventListener('touchend',   release, {passive:false});
  btn.addEventListener('touchcancel',release, {passive:false});
});

// Tap the canvas itself = Z/confirm (handy for dialogue advancement)
cv.addEventListener('touchend', e => {
  e.preventDefault();
  jp['KeyZ'] = true;
}, {passive:false});

// Scale canvas visually to fit narrow screens while keeping 600×520 logic
function resizeCanvas() {
  const wrap = document.getElementById('wrap');
  const maxW = Math.min(window.innerWidth, 600);
  wrap.style.maxWidth = maxW + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---- USERNAME OVERLAY -------------------------------------------
function showNameOverlay() {
  const overlay = document.getElementById('nameOverlay');
  const input   = document.getElementById('nameInput');
  const errEl   = document.getElementById('nameError');
  const btn     = document.getElementById('nameSubmit');
  input.value = gs.username || '';
  errEl.textContent = '';
  overlay.classList.add('active');

  function attempt() {
    const raw = input.value.trim();
    if (raw.length < 3)  { errEl.textContent = '* At least 3 characters required.'; return; }
    if (raw.length > 40) { errEl.textContent = '* Max 40 characters.'; return; }
    if (!/^[a-zA-Z0-9 _\-]+$/.test(raw)) { errEl.textContent = '* Letters, numbers, spaces, _ and - only.'; return; }
    gs.username = raw;
    localStorage.setItem(NAME_KEY, raw);
    overlay.classList.remove('active');
    sfxConfirm();
  }
  btn.onclick = attempt;
  input.onkeydown = e => { if (e.key === 'Enter') attempt(); };

  // Build virtual keyboard once
  if (document.getElementById('vkb')) return;
  const ROWS = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L','⌫'],
    ['Z','X','C','V','B','N','M','_','-'],
  ];
  const vkb = document.createElement('div');
  vkb.id = 'vkb';

  ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'vkb-row';
    row.forEach(ch => {
      const k = document.createElement('button');
      k.type = 'button';
      k.className = 'vkb-key' + (ch === '⌫' ? ' k-back' : '');
      k.textContent = ch;
      k.dataset.ch = ch;
      rowEl.appendChild(k);
    });
    vkb.appendChild(rowEl);
  });

  // Bottom row: space + confirm
  const botRow = document.createElement('div');
  botRow.className = 'vkb-row';
  const spaceK = document.createElement('button');
  spaceK.type = 'button'; spaceK.className = 'vkb-key k-space';
  spaceK.textContent = 'SPACE'; spaceK.dataset.ch = ' ';
  const confirmK = document.createElement('button');
  confirmK.type = 'button'; confirmK.className = 'vkb-key k-confirm';
  confirmK.textContent = 'CONFIRM ✓'; confirmK.dataset.ch = 'CONFIRM';
  botRow.appendChild(spaceK); botRow.appendChild(confirmK);
  vkb.appendChild(botRow);

  document.getElementById('nameBox').appendChild(vkb);

  function handleKey(ch) {
    if (ch === '⌫')      { input.value = input.value.slice(0, -1); }
    else if (ch === 'CONFIRM') { attempt(); }
    else if (input.value.length < 40) { input.value += ch; }
    errEl.textContent = '';
  }

  vkb.addEventListener('mousedown', e => {
    e.preventDefault();
    const k = e.target.closest('.vkb-key');
    if (k) handleKey(k.dataset.ch);
  });
  vkb.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const k = el && el.closest('.vkb-key');
    if (k) handleKey(k.dataset.ch);
  }, { passive: false });
}

// ---- INIT -------------------------------------------------------
loadGame();
requestAnimationFrame(loop);
if (!gs.username) showNameOverlay();
