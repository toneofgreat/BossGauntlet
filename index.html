let AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if (AC.state==='suspended') AC.resume().then(()=>{ if(gs && gs.state==='title'&&!_mPlaying) startMusic(); }).catch(()=>{});
  return AC;
}
function tone(freq, dur, type='square', vol=0.13) {
  try {
    const o = ac().createOscillator(), g = ac().createGain();
    o.connect(g); g.connect(ac().destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac().currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac().currentTime + dur);
    o.start(); o.stop(ac().currentTime + dur);
  } catch(e) {}
}
function sfxSelect()  { tone(550, 0.07); }
function sfxConfirm() { tone(880,0.08); setTimeout(()=>tone(1100,0.1),80); }
function sfxHit()     { tone(160,0.18,'sawtooth',0.25); }
function sfxDie()     { [200,160,120,80].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sawtooth',0.25),i*160)); }
function sfxWin()     { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.28,'square',0.15),i*190)); }
function sfxBoom()    { tone(70,0.5,'sawtooth',0.3); }
function sfxDeny()    { tone(200,0.2,'square',0.1); }

// ---- SAVE / LOAD --------------------------------------------------
const SAVE_KEY = 'bossGauntlet_v1';

function saveGame() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    ul_u: gs.unlocked_u, bt_u: gs.beaten_u,
    ul_s: gs.unlocked_s, bt_s: gs.beaten_s,
    ul_d: gs.unlocked_d, bt_d: gs.beaten_d,
    ob_u: gs.obbyUnlocked, ob_b: gs.obbyBeaten,
    gold: gs.gold, owned: gs.ownedItems, hskin: gs.heartSkin
  }));
}
function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      if(d.ul_u){ gs.unlocked_u=d.ul_u; gs.beaten_u=d.bt_u; }
      else if(d.ul){ gs.unlocked_u=d.ul; gs.beaten_u=d.bt; } // migrate old saves
      if(d.ul_s){ gs.unlocked_s=d.ul_s; gs.beaten_s=d.bt_s; }
      if(d.ul_d){ gs.unlocked_d=d.ul_d; gs.beaten_d=d.bt_d; }
      if(d.ob_u){ gs.obbyUnlocked=d.ob_u; gs.obbyBeaten=d.ob_b; }
      if(d.gold !== undefined) gs.gold = d.gold;
      if(d.owned) gs.ownedItems = d.owned;
      if(d.hskin) gs.heartSkin = d.hskin;
      while(gs.unlocked_u.length<9)  gs.unlocked_u.push(false);
      while(gs.beaten_u.length<9)    gs.beaten_u.push(false);
      while(gs.unlocked_s.length<6)  gs.unlocked_s.push(false);
      while(gs.beaten_s.length<6)    gs.beaten_s.push(false);
      while(gs.unlocked_d.length<13) gs.unlocked_d.push(false);
      while(gs.beaten_d.length<13)   gs.beaten_d.push(false);
    }
  } catch(e) {}
}

// ---- INPUT --------------------------------------------------------
const keys = {}, jp = {}, jpu = {};
function _unlockAudio() {
  const ctx = ac(); // creates AC if needed, resumes if suspended
  if(ctx.state==='running' && gs && gs.state==='title' && !_mPlaying) startMusic();
}
window.addEventListener('keydown', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  _unlockAudio();
  if (!keys[e.code]) jp[e.code]=true; keys[e.code]=true; e.preventDefault();
});
window.addEventListener('keyup',   e => { keys[e.code]=false; jpu[e.code]=true; });
window.addEventListener('pointerdown', _unlockAudio, {once:false});
function clearJP() { for (const k in jp) delete jp[k]; for (const k in jpu) delete jpu[k]; }
const dn  = (a,b) => keys[a]||(b&&keys[b]);
const hit = (a,b) => jp[a]||(b&&jp[b]);

// ---- DRAW UTILS ---------------------------------------------------
function fr(x,y,w,h,c)      { cx.fillStyle=c; cx.fillRect(x,y,w,h); }
function sr(x,y,w,h,c,lw=1) { cx.strokeStyle=c; cx.lineWidth=lw; cx.strokeRect(x,y,w,h); }
function tx(s,x,y,c='#fff',sz=14,al='left') {
  cx.fillStyle=c; cx.font=`${sz}px 'Courier New',monospace`; cx.textAlign=al; cx.fillText(s,x,y);
}
function shake(a) { gs.shakeX=(Math.random()-0.5)*a*2; gs.shakeY=(Math.random()-0.5)*a*2; }
function flash(a) { gs.flashA=Math.max(gs.flashA,a); }

// ---- BOSS SPRITES (procedural) ------------------------------------
function drawSprite(boss, sx, sy, sc=1) {
  cx.save();
  cx.translate(sx, sy);
  cx.scale(sc, sc);
  const t = gs.frame;
  const bob = Math.sin(t*0.05)*3;
  cx.translate(0, bob);
  const invFlick = gs.invTimer>0 && Math.floor(t/3)%2===0;
  if (!invFlick) _sprite(boss);
  cx.restore();
}

function _sprite(b) {
  const c = b.color, e = b.ec, t = gs.frame;
  switch(b.id) {
    case 'sans': case 'double':
      fr(-28,-38,56,42,c); fr(-22,4,44,28,c);        // head+body
      cx.fillStyle=e; _arc(-10,-18,9); _arc(10,-18,9); // eyes
      fr(-18,-4,36,5,'#000');                           // mouth
      break;
    case 'toriel': case 'dstory':
      fr(-22,-42,44,48,c);                             // body
      cx.fillStyle=c;
      _tri(-22,-42,-34,-64,-10,-42); _tri(22,-42,34,-64,10,-42); // horns
      cx.fillStyle=e; _arc(-8,-22,7); _arc(8,-22,7);
      fr(-16,-6,32,5,'#333');
      break;
    case 'troll':
      cx.fillStyle=c; _arc(0,-8,32);                   // round face
      cx.fillStyle='#000'; _arc(-12,-16,6); _arc(12,-16,6);
      cx.fillStyle=e; _arc(-12,-16,3); _arc(12,-16,3);
      cx.strokeStyle='#000'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(0,-2,14,0.2,Math.PI-0.2); cx.stroke();
      break;
    case 'chara':
      fr(-20,-44,40,50,'#800000');
      cx.fillStyle=e; _arc(-8,-22,8); _arc(8,-22,8);
      cx.fillStyle='#ff0000'; _arc(-8,-22,5); _arc(8,-22,5);
      // knife
      cx.fillStyle='#cccccc';
      cx.beginPath(); cx.moveTo(22,6); cx.lineTo(38,-32); cx.lineTo(40,-30); cx.lineTo(24,8); cx.fill();
      break;
    case 'mark':
      cx.fillStyle='#f4a460'; _arc(0,-14,30);           // face
      fr(-30,-46,60,22,'#3a1a00');                       // hair
      cx.fillStyle='#000'; _arc(-10,-16,7); _arc(10,-16,7);
      cx.fillStyle=e; _arc(-10,-16,4); _arc(10,-16,4);
      cx.strokeStyle='#ff2200'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(0,0,16,0.15,Math.PI-0.15); cx.stroke();
      break;
    case 'final': {
      const hue = (t*2)%360;
      for (let i=0;i<8;i++) {
        const a=(i/8)*Math.PI*2+t*0.025, r=42;
        cx.fillStyle=`hsl(${(i*45+t)%360},100%,55%)`;
        _arc(Math.cos(a)*r*0.32, Math.sin(a)*r*0.32-8, 11);
      }
      cx.fillStyle=`hsl(${hue},80%,60%)`; _arc(0,-10,22);
      cx.fillStyle=b.ec; _arc(-9,-15,7); _arc(9,-15,7);
      break;
    }
    default:
      cx.fillStyle=c; _arc(0,-10,30);
      cx.fillStyle=e; _arc(-10,-16,8); _arc(10,-16,8);
      fr(-15,-4,30,5,'#000');
  }
}
function _arc(x,y,r) { cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); }
function _tri(x1,y1,x2,y2,x3,y3) { cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.lineTo(x3,y3); cx.closePath(); cx.fill(); }

// ---- PROJECTILE SYSTEM -------------------------------------------
function addP(type,x,y,vx,vy,extra) {
  if (gs.projs.length>600) gs.projs.shift();
  gs.projs.push({ type, x, y, vx, vy, life:0, dead:false, ...extra });
}

function updateProjs() {
  const box = gs.box;
  const np = [];
  if(gs.slowTimer > 0) gs.slowTimer--;
  const slowMult = gs.slowTimer > 0 ? 0.25 : 1;
  for (const p of gs.projs) {
    p.x += p.vx * slowMult; p.y += p.vy * slowMult; p.life++;
    if (p.upd) p.upd(p);

    // Player collision (only in enemy state, not invincible)
    if (gs.state==='enemy' && gs.invTimer<=0 && !p.dead && p.type!=='fake') {
      const dx=gs.px-p.x, dy=gs.py-p.y;
      let hit=false;
      if (p.type==='bone'||p.type==='bone_blue') {
        const hw=Math.abs(p.bw)/2, hh=Math.abs(p.bh)/2;
        const ax=Math.abs(dx), ay=Math.abs(dy);
        hit = ax<hw+5 && ay<hh+5;
      } else {
        const r=p.r||5;
        hit = dx*dx+dy*dy < (r+5)*(r+5);
      }
      if (hit) {
        if (p.type==='bone_blue') {
          const mv = dn('ArrowLeft','KeyA')||dn('ArrowRight','KeyD')||dn('ArrowUp','KeyW')||dn('ArrowDown','KeyS');
          if (mv) { takeDmg(p.dmg||bossDmg()); p.dead=true; }
        } else {
          takeDmg(p.dmg||bossDmg()); p.dead=true;
        }
      }
    }

    const vis = p.x>-120&&p.x<W+120&&p.y>-120&&p.y<H+120;
    if (vis && !p.dead && p.life<(p.maxL||9999)) np.push(p);
  }
  gs.projs = np;
}

function drawProjs() {
  for (const p of gs.projs) {
    cx.save();
    cx.globalAlpha = p.alpha||1;
    if (p.type==='bone'||p.type==='bone_blue') {
      cx.fillStyle = p.type==='bone_blue' ? '#4499ff' : '#ffffff';
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.ang||0);
      cx.fillRect(-p.bw/2,-p.bh/2,p.bw,p.bh); cx.restore();
    } else if (p.type==='blaster') {
      cx.fillStyle=p.col||'#00ffff'; cx.shadowBlur=14; cx.shadowColor=p.col||'#00ffff';
      _arc2(p.x,p.y,p.r||8);
    } else if (p.type==='bullet') {
      cx.fillStyle=p.col||'#ff8800'; _arc2(p.x,p.y,p.r||5);
    } else if (p.type==='ring') {
      cx.strokeStyle=p.col||'#ff0088'; cx.lineWidth=4; cx.shadowBlur=8; cx.shadowColor=p.col;
      cx.beginPath(); cx.arc(p.x,p.y,p.r||10,0,Math.PI*2); cx.stroke();
    } else if (p.type==='fake') {
      cx.fillStyle='#666'; cx.globalAlpha=0.35; _arc2(p.x,p.y,p.r||5);
    } else if (p.type==='laser') {
      cx.fillStyle=p.col||'#ff0000'; cx.globalAlpha=0.75; cx.fillRect(p.x,p.y,p.bw||8,p.bh||H);
    }
    cx.restore();
  }
}
function _arc2(x,y,r) { cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); }

function bossDmg() {
  const [mn,mx]=gs.boss.atk; return Math.floor(mn+Math.random()*(mx-mn));
}
function takeDmg(d) {
  let dmg = d;
  if(hasItem('godmode'))   dmg = Math.floor(dmg * 0.5);
  if(hasItem('fortress'))  dmg = Math.floor(dmg * 0.6);
  else if(hasItem('armor')) dmg = Math.floor(dmg * 0.75);
  gs.php = Math.max(0, gs.php - dmg);
  gs.invTimer = 55; shake(4); flash(0.25); sfxHit();
  if (gs.php<=0) {
    if(gs.phoenixLives > 0){
      gs.phoenixLives--;
      gs.php = 75;
      flash(0.9); shake(12);
      tone(1200,0.4,'sine',0.25);
    } else if(hasItem('crystal') && !gs.crystalUsed){
      gs.crystalUsed = true;
      gs.php = 50;
      flash(0.8); shake(10);
      tone(880,0.3,'sine',0.2);
    } else {
      gs.state='dead'; gs.deathTimer=200; sfxDie(); stopMusic();
    }
  }
}

// ---- SPAWN HELPERS -----------------------------------------------
function bx() { return gs.box.x; } function by_() { return gs.box.y; }
function bw() { return gs.box.w; } function bh_() { return gs.box.h; }
function bcx(){ return bx()+bw()/2; } function bcy(){ return by_()+bh_()/2; }
function randBY() { return by_()+Math.random()*bh_(); }
function randBX() { return bx()+Math.random()*bw(); }
function randSide() {
  const s=Math.floor(Math.random()*4);
  if(s===0) return [bx()-20, randBY()];
  if(s===1) return [bx()+bw()+20, randBY()];
  if(s===2) return [randBX(), by_()-20];
  return [randBX(), by_()+bh_()+20];
}
function aimAt(sx,sy,spd) {
  const dx=gs.px-sx, dy=gs.py-sy, d=Math.sqrt(dx*dx+dy*dy)||1;
  return [(dx/d)*spd,(dy/d)*spd];
}

function spawnBone(y, dir, spd, boneW, boneH, col) {
  const sx = dir<0 ? bx()+bw()+20 : bx()-20;
  addP('bone',sx,y,spd*dir,0,{bw:boneW||80,bh:boneH||13,col});
}
function spawnVBone(x, dir, spd) {
  const sy = dir<0 ? by_()+bh_()+20 : by_()-20;
  addP('bone',x,sy,0,spd*dir,{bw:13,bh:70});
}
function spawnBlaster(sx,sy,vx,vy) {
  addP('blaster',sx,sy,vx,vy,{r:8,col:'#00ffff'});
}
function spawnAimedBlaster(sx,sy,spd,col) {
  const [vx,vy]=aimAt(sx,sy,spd);
  addP('blaster',sx,sy,vx,vy,{r:7,col:col||'#00ffff'});
}
function spawnBullet(sx,sy,vx,vy,r,col,dmg) {
  addP('bullet',sx,sy,vx,vy,{r:r||5,col:col||'#ff8800',dmg:dmg||bossDmg()});
}
function spawnRing(x,y,growSpd,col,maxR) {
  let p={type:'ring',x,y,vx:0,vy:0,r:8,col:col||'#ff0088',life:0};
  p.upd = q => { q.r += growSpd||1.8; if(q.r>(maxR||110)) q.dead=true; };
  gs.projs.push(p);
}
function spawnHomingBullet(sx,sy,spd,col,homeStr) {
  let p={type:'bullet',x:sx,y:sy,vx:0,vy:spd,r:8,col:col||'#ff88ff',life:0};
  p.upd = q => {
    const dx=gs.px-q.x, dy=gs.py-q.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    q.vx += (dx/d)*(homeStr||1.2);
    q.vy += (dy/d)*(homeStr||1.2);
    const s=Math.sqrt(q.vx*q.vx+q.vy*q.vy), max=spd*1.8||3;
    if(s>max){q.vx*=max/s;q.vy*=max/s;}
  };
  gs.projs.push(p);
}

// ---- DIALOGUE SYSTEM ---------------------------------------------
function dialogue(lines, cb) {
  gs.dLines=lines; gs.dLine=0; gs.dTimer=0; gs.dCB=cb;
  gs.state='cutscene';
}
function drawDialogueBox(lines, lineIdx) {
  const bx_=38, by_2=362, bw_=524, bh_=148;
  fr(bx_,by_2,bw_,bh_,'#000'); sr(bx_,by_2,bw_,bh_,'#fff',2);
  const line=lines[lineIdx]||'';
  const shown=line.substring(0,Math.min(line.length,Math.floor(gs.dTimer/1.4)));
  // Word wrap
  cx.save(); cx.font="14px 'Courier New',monospace"; cx.fillStyle='#fff'; cx.textAlign='left';
  const words=shown.split(' '); let row=0, cur='';
  for(const w of words){
    const test=cur+(cur?' ':'')+w;
    if(cx.measureText(test).width>bw_-26){cx.fillText(cur,bx_+12,by_2+28+row*22);cur=w;row++;}
    else cur=test;
  }
  if(cur) cx.fillText(cur,bx_+12,by_2+28+row*22);
  cx.restore();
  if(shown.length>=line.length&&Math.floor(gs.frame/18)%2===0)
    tx('▼',bx_+bw_-22,by_2+bh_-10,'#fff',13);
  tx(`${lineIdx+1}/${lines.length}`,bx_+bw_-10,by_2+12,'#555',10,'right');
}

  if(gs.slowTimer>0){
    const secs=Math.ceil(gs.slowTimer/60);
    const pulse=Math.sin(gs.frame*0.3)>0;

    : [null,null,null,null];

      bx_=mx+10+(i%2)*255; by__=my+36+Math.floor(i/2)*50;

    fr(bx_,by__,bw_,bh_,sel?(c?'#001a1a':'#1a1a3a'):'#0a0a0a');

    tx(ITEMS[i],bx_+28,by__+28,sel?(c||'#fff'):(c?'#226666':'#888'),n===5?12:15);

// ---- GAME LOGIC -------------------------------------------------
function startFight(idx) {
  if(!ulk()[idx]) return;
  startBattleMusic();
  gs.maxBossReached = Math.max(gs.maxBossReached, idx);
  const boss=bossArr()[idx];
  gs.bossIdx=idx; gs.boss=boss;
  gs.bossHP=boss.hp; gs.bossHP2=boss.hp2||0;
  gs.bossPhase=0; gs.fakeDied=false;
  gs.projs=[]; gs.invTimer=0;
  let maxHP = 100;
  if(hasItem('ironheart')) maxHP += 50;
  if(hasItem('fortress'))  maxHP += 150;
  if(hasItem('godmode'))   maxHP *= 2;
  gs.pMaxHP = maxHP;
  gs.php = gs.pMaxHP;
  let itemCount = hasItem('medkit') ? 8 : 5;
  if(hasItem('berserker'))  itemCount = 1;
  if(hasItem('godmode'))    itemCount = itemCount * 3;
  gs.items = itemCount;
  gs.phoenixLives = hasItem('phoenix') ? 2 : 0;
  gs.crystalUsed = false;
  gs.phoenixLives = hasItem('phoenix') ? 2 : 0;
  gs.slowTimer = 0; gs.slowUsed = false;
  gs.reversed=false; gs.invisible=false;
  gs.menuSel=0; gs.memPos=[]; gs.flashbangTimer=0;
  gs.shakeX=0; gs.shakeY=0; gs.flashA=0;
  gs.fakeDieTimer=0;
  const box=gs.box; gs.px=box.x+box.w/2; gs.py=box.y+box.h/2;
  dialogue(boss.ds||['* ...'], startEnemyTurn);
}

function startEnemyTurn() {
  gs.state='enemy';
  gs.reversed=false; gs.invisible=false; gs.projs=[]; gs.spawnTimer=0;
  const boss=gs.boss, n=boss.atks.length;
  const avail=boss.atks.slice(0,Math.min(n,1+gs.bossPhase*2+1));
  gs.attackName=avail[Math.floor(Math.random()*avail.length)];
  gs.attackTimer=180+gs.bossIdx*28+gs.bossPhase*45;
}

function startPlayerTurn() {
  gs.state='player'; gs.reversed=false; gs.invisible=false; gs.projs=[];
  gs.menuSel=0;
  const box=gs.box; gs.px=box.x+box.w/2; gs.py=box.y+box.h/2;
}

function startSlider() {
  gs.state='slider';
  gs.sliderX=0; gs.sliderDir=1;
  gs.sliderSpd=1.4+gs.bossIdx*0.35+gs.bossPhase*0.45;
  gs.sliderLocked=false; gs.sliderShowTimer=0;
}

function confirmSlider() {
  gs.sliderLocked=true;
  gs.sliderShowTimer=50;
  const acc=1-Math.abs(gs.sliderX-0.5)*2;
  const base = gs.campaign==='d'
    ? [60,100,150,250,400,650,1000,1500,2200,3000,5000,7500,10000][gs.bossIdx]||60
    : gs.campaign==='s'
      ? [90,110,140,180,260,500][gs.bossIdx]||90
      : [80,70,90,100,120,130,150,800,1500][gs.bossIdx]||80;
  const effectiveAcc = hasItem('ultralucky') ? 1.0 : acc;
  let sliderMult = 0.25+effectiveAcc*1.75;
  if(hasItem('lucky'))     sliderMult *= 1.3;
  if(hasItem('berserker')) sliderMult *= 2.0;
  gs.sliderDamage=Math.floor(base*sliderMult);
  sfxConfirm();
}

function applySliderDamage() {
  dealDamageToBoss(gs.sliderDamage);
  if(hasItem('lifedrain')) gs.php = Math.min(gs.pMaxHP, gs.php+8);
  gs.resultDmg=gs.sliderDamage; gs.resultTimer=80;
  if(gs.state!=='boss_dead'&&gs.state!=='cutscene'&&gs.state!=='fakedie')
    gs.state='result';
}

function dealDamageToBoss(dmg) {
  const boss=gs.boss;
  if(boss.isDouble&&gs.bossHP2>0){
    if(Math.random()<0.5) gs.bossHP=Math.max(0,gs.bossHP-dmg);
    else gs.bossHP2=Math.max(0,gs.bossHP2-dmg);
  } else {
    gs.bossHP=Math.max(0,gs.bossHP-dmg);
  }
  // Update phase
  const f=gs.bossHP/boss.hp, th=boss.phases||[];
  let nph=0;
  for(let i=0;i<th.length;i++) if(f<=th[i]) nph=i+1;
  if(nph>gs.bossPhase){ gs.bossPhase=nph; shake(12); flash(0.6); sfxBoom(); }
  else { shake(4); flash(0.15); }

  // Fake die check
  if(boss.hasFakeDie&&!gs.fakeDied&&(gs.bossHP/boss.hp)<=(boss.fakeHP||0.5)){
    gs.fakeDied=true;
    gs.bossHP=boss.hp; // RESET
    gs.bossPhase=Math.max(1,th.length);
    dialogue(boss.df||['* psych!'], startEnemyTurn);
    return;
  }

  const total=boss.isDouble?(gs.bossHP+gs.bossHP2):gs.bossHP;
  if(total<=0){
    btn()[gs.bossIdx]=true;
    if(gs.bossIdx+1<bossArr().length) ulk()[gs.bossIdx+1]=true;
    saveGame();
    const goldTbl = gs.campaign==='d'
      ? [30,50,80,130,200,300,450,700,1000,1500,2500,4000,10000]
      : gs.campaign==='s'
        ? [60,90,130,180,250,400]
        : [50,40,80,100,120,150,180,300,500];
    const earned = earnGold(goldTbl[gs.bossIdx] || 50);
    gs.resultGold = earned;
    gs.state='boss_dead'; gs.dLine=0; gs.dTimer=0;
    sfxWin(); stopMusic();
  }
}

function spawnObbyProj(bx, by, vx, vy, type, opts) {
  gs.obbyProjs.push(Object.assign({x:bx,y:by,vx,vy,type,life:0},opts||{}));
}
function obbyAim(bx,by,spd) {
  const dx=gs.px-bx, dy=gs.py-by, d=Math.sqrt(dx*dx+dy*dy)||1;
  return [(dx/d)*spd,(dy/d)*spd];
}
function obbyAttack() {
  const lv = obbyLvl(), lv_=gs.obbyLevel, bx=gs.obbyBx, by=gs.obbyBy;
  gs.obbySpawnT = lv.fr;
  const spd=3.5+lv_*0.2;
  if(lv_===0) {
    // Flowey: single aimed bullet
    const [vx,vy]=obbyAim(bx,by,spd*0.8);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:7,col:'#ffff44'});
  } else if(lv_===1) {
    // Napstablook: slow drifting 3-way
    for(let i=-1;i<=1;i++){
      const [vx,vy]=obbyAim(bx,by,spd*0.7);
      spawnObbyProj(bx,by,vx+i*0.8,vy,  'bullet',{r:6,col:'#888888'});
    }
  } else if(lv_===2) {
    // Monster Kid: scatter 5-way
    for(let i=-2;i<=2;i++){
      const [vx,vy]=obbyAim(bx,by,spd*0.9);
      spawnObbyProj(bx,by,vx+i*1.1,vy+i*0.3,'bullet',{r:5,col:'#ff8844'});
    }
  } else if(lv_===3) {
    // Papyrus: 2 horizontal bones
    spawnObbyProj(bx,by,spd,0,'bone',{bw:80,bh:12});
    spawnObbyProj(bx,by+30,spd*0.9,0,'bone',{bw:80,bh:12});
  } else if(lv_===4) {
    // Muffet: 6-way spider spread
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      spawnObbyProj(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'bullet',{r:7,col:'#dd44ff'});
    }
  } else if(lv_===5) {
    // Mettaton: 8-way star + aimed
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      spawnObbyProj(bx,by,Math.cos(a)*(spd*0.9),Math.sin(a)*(spd*0.9),'bullet',{r:6,col:'#ff44aa'});
    }
    const [vx,vy]=obbyAim(bx,by,spd*1.2);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:9,col:'#ffffff'});
  } else if(lv_===6) {
    // Undyne: aimed spear (fast bone) + flanking
    const [vx,vy]=obbyAim(bx,by,spd*1.5);
    spawnObbyProj(bx,by,vx,vy,'bone',{bw:70,bh:10,ang:Math.atan2(vy,vx)});
    const a2=Math.atan2(vy,vx)+0.5;
    spawnObbyProj(bx,by,Math.cos(a2)*spd,Math.sin(a2)*spd,'bone',{bw:60,bh:10,ang:a2});
    const a3=Math.atan2(vy,vx)-0.5;
    spawnObbyProj(bx,by,Math.cos(a3)*spd,Math.sin(a3)*spd,'bone',{bw:60,bh:10,ang:a3});
  } else if(lv_===7) {
    // Asgore: triangle (3-way) + rings
    for(let i=0;i<3;i++){
      const [vx,vy]=obbyAim(bx,by,spd);
      const a=Math.atan2(vy,vx)+(i-1)*0.45;
      spawnObbyProj(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'bullet',{r:8,col:'#ee8800'});
    }
    gs.obbyProjs.push({x:bx,y:by,vx:0,vy:0,type:'ring',r:10,col:'#ee8800',life:0,
      upd:p=>{ p.r+=3; if(p.r>180)p.dead=true; }});
  } else if(lv_===8) {
    // Chara: precise aimed + 2 silent flankers
    const [vx,vy]=obbyAim(bx,by,spd*1.4);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:10,col:'#aa0000'});
    const ang=Math.atan2(vy,vx);
    spawnObbyProj(bx,by,Math.cos(ang+0.3)*spd,Math.sin(ang+0.3)*spd,'bullet',{r:7,col:'#880000'});
    spawnObbyProj(bx,by,Math.cos(ang-0.3)*spd,Math.sin(ang-0.3)*spd,'bullet',{r:7,col:'#880000'});
  } else if(lv_===9) {
    // Omega Flowey: 12-way ring burst + aimed
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2;
      spawnObbyProj(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'bullet',{r:6,col:'#00ff44'});
    }
    const [vx,vy]=obbyAim(bx,by,spd*1.5);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:10,col:'#ffffff'});
  } else if(lv_===10) {
    // Error Sans: glitch - random positions near player, aimed
    for(let i=0;i<4;i++){
      const rx=gs.px+(Math.random()-0.5)*120, ry=gs.py+(Math.random()-0.5)*120;
      const [vx,vy]=obbyAim(rx,ry,spd*1.2);
      spawnObbyProj(rx,ry,vx,vy,'bullet',{r:7,col:'#4444ff'});
    }
    // Also aimed from boss
    const [vx2,vy2]=obbyAim(bx,by,spd*1.5);
    spawnObbyProj(bx,by,vx2,vy2,'bone',{bw:72,bh:11,ang:Math.atan2(vy2,vx2)});
  } else if(lv_===11) {
    // Ink Sans: colorful splash + aimed burst
    for(let i=0;i<10;i++){
      const a=(i/10)*Math.PI*2+gs.obbyFrame*0.05;
      spawnObbyProj(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'bullet',{r:6,col:`hsl(${i*36},100%,60%)`});
    }
    const [vx,vy]=obbyAim(bx,by,spd*1.6);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:11,col:'#ffffff'});
  } else if(lv_===12) {
    // Gaster: 2 hand blasters from offset positions + 16-way burst
    spawnObbyProj(bx-60,by,  ...obbyAim(bx-60,by,spd*1.3),'bullet',{r:9,col:'#aaaaaa'});
    spawnObbyProj(bx+60,by,  ...obbyAim(bx+60,by,spd*1.3),'bullet',{r:9,col:'#aaaaaa'});
    for(let i=0;i<16;i++){
      const a=(i/16)*Math.PI*2;
      spawnObbyProj(bx,by,Math.cos(a)*(spd*0.8),Math.sin(a)*(spd*0.8),'bullet',{r:5,col:'#ffffff'});
    }
  } else if(lv_===13) {
    // True Chara: everything at once, fast
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      spawnObbyProj(bx,by,Math.cos(a)*spd*1.1,Math.sin(a)*spd*1.1,'bullet',{r:8,col:'#ff0000'});
    }
    const [vx,vy]=obbyAim(bx,by,spd*2);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:13,col:'#ff4444'});
    for(let i=0;i<3;i++){
      const [vx2,vy2]=obbyAim(bx,by,spd*1.5);
      const ang=Math.atan2(vy2,vx2)+(i-1)*0.3;
      spawnObbyProj(bx,by,Math.cos(ang)*spd*1.5,Math.sin(ang)*spd*1.5,'bone',{bw:70,bh:10,ang});
    }
  } else {
    // THE WORLD (lv_===14): absolute chaos, every frame is agony
    // 20-way burst
    for(let i=0;i<20;i++){
      const a=(i/20)*Math.PI*2+gs.obbyFrame*0.08;
      spawnObbyProj(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'bullet',{r:7,col:`hsl(${i*18+gs.obbyFrame*3},100%,60%)`});
    }
    // Fast aimed
    const [vx,vy]=obbyAim(bx,by,spd*2.2);
    spawnObbyProj(bx,by,vx,vy,'bullet',{r:14,col:'#ffffff'});
    // Glitch positions
    for(let i=0;i<3;i++){
      const rx=Math.random()*600,ry=Math.random()*520;
      const [vx2,vy2]=obbyAim(rx,ry,spd*1.5);
      spawnObbyProj(rx,ry,vx2,vy2,'bullet',{r:8,col:'#ff00ff'});
    }
    // Rings
    gs.obbyProjs.push({x:bx,y:by,vx:0,vy:0,type:'ring',r:10,col:'#ff00ff',life:0,
      upd:p=>{ p.r+=4; if(p.r>200)p.dead=true; }});
  }
}

function updObby() {
  const spd = 3.5 * (hasItem('boots') ? 1.4 : 1);
  let dx=0, dy=0;
  if(dn('ArrowLeft','KeyA'))  dx-=spd;
  if(dn('ArrowRight','KeyD')) dx+=spd;
  if(dn('ArrowUp','KeyW'))    dy-=spd;
  if(dn('ArrowDown','KeyS'))  dy+=spd;
  gs.px=Math.max(8,Math.min(W-8,gs.px+dx));
  gs.py=Math.max(8,Math.min(H-8,gs.py+dy));

  gs.obbyFrame++;
  if(gs.obbyInv>0) gs.obbyInv--;
  gs.shakeX*=0.8; gs.shakeY*=0.8;
  if(gs.flashA>0) gs.flashA=Math.max(0,gs.flashA-0.03);

  // Slow time countdown (obby)
  if(gs.slowTimer>0) gs.slowTimer--;
  const obbySlowMult = gs.slowTimer>0 ? 0.25 : 1;

  // Boss chases player
  const lv=obbyLvl();
  const bdx=gs.px-gs.obbyBx, bdy=gs.py-gs.obbyBy;
  const bd=Math.sqrt(bdx*bdx+bdy*bdy)||1;
  gs.obbyBx+=( bdx/bd)*lv.spd*obbySlowMult;
  gs.obbyBy+=(bdy/bd)*lv.spd*obbySlowMult;

  // Boss touches player
  if(gs.obbyInv<=0){
    const dist2=(gs.px-gs.obbyBx)**2+(gs.py-gs.obbyBy)**2;
    if(dist2<(30+8)**2){
      if(gs.obbyShield){ gs.obbyShield=false; flash(0.5); shake(8); }
      else gs.obbyHP--;
      gs.obbyInv = 90 + (hasItem('iframes')?40:0);
      gs.shakeX=8; gs.shakeY=8; gs.flashA=0.4;
      sfxHit();
      if(gs.obbyHP<=0){ gs.state='obby_dead'; gs.obbyDeathTimer=180; sfxDie(); return; }
    }
  }

  // Spawn attack
  gs.obbySpawnT--;
  if(gs.obbySpawnT<=0) obbyAttack();

  // Activate slow time with Shift key in obby (once per level)
  if(hit('ShiftLeft','ShiftRight') && hasItem('slowtime') && !gs.slowUsed && gs.slowTimer<=0){
    gs.slowUsed=true; gs.slowTimer=900; flash(0.3); tone(300,0.5,'sine',0.2);
  }

  // Update projectiles
  const np=[];
  for(const p of gs.obbyProjs){
    if(p.upd) p.upd(p);
    p.x+=p.vx*obbySlowMult; p.y+=p.vy*obbySlowMult; p.life++;
    if(p.dead||p.x<-150||p.x>W+150||p.y<-150||p.y>H+150){ continue; }

    // Hit player
    if(gs.obbyInv<=0){
      let hit_=false;
      const dx_=p.x-gs.px, dy_=p.y-gs.py;
      if(p.type==='bone'){
        const cosA=Math.cos(-(p.ang||0)), sinA=Math.sin(-(p.ang||0));
        const rx=cosA*dx_-sinA*dy_, ry=sinA*dx_+cosA*dy_;
        hit_=Math.abs(rx)<(p.bw||70)/2+5 && Math.abs(ry)<(p.bh||12)/2+5;
      } else if(p.type==='ring'){
        const d=Math.sqrt(dx_*dx_+dy_*dy_);
        hit_=Math.abs(d-p.r)<10;
      } else {
        hit_=dx_*dx_+dy_*dy_<((p.r||7)+6)**2;
      }
      if(hit_){
        if(gs.obbyShield){ gs.obbyShield=false; flash(0.5); shake(8); p.dead=true; }
        else gs.obbyHP--;
        gs.obbyInv = 90 + (hasItem('iframes')?40:0);
        gs.shakeX=6; gs.shakeY=6; gs.flashA=0.35;
        sfxHit();
        p.dead=true;
        if(gs.obbyHP<=0){ gs.state='obby_dead'; gs.obbyDeathTimer=180; sfxDie(); return; }
      }
    }
    np.push(p);
  }
  gs.obbyProjs=np;

  // Countdown
  gs.obbyTimer--;
  if(gs.obbyTimer<=0){
    // WIN
    gs.obbyBeaten[gs.obbyLevel]=true;
    if(gs.obbyLevel+1<15) gs.obbyUnlocked[gs.obbyLevel+1]=true;
    saveGame(); sfxWin();
    gs.state='obby_clear';
  }
}

  // Draw player heart
  cx.save();
  if(gs.obbyInv>0&&Math.floor(gs.obbyInv/6)%2===0) cx.globalAlpha=0.2;
  cx.font='bold 18px serif'; cx.textAlign='center'; cx.textBaseline='middle';

  cx.restore();
  cx.textBaseline='alphabetic';

  // Shake/flash
  if(gs.flashA>0){ cx.fillStyle=`rgba(255,255,255,${gs.flashA})`; cx.fillRect(0,0,W,H); }
}

function updShop() {
  const n = SHOP_ITEMS.length;
  if(hit('ArrowUp','KeyW')){ gs.shopSel=Math.max(0,gs.shopSel-1); sfxSelect(); }
  if(hit('ArrowDown','KeyS')){ gs.shopSel=Math.min(n-1,gs.shopSel+1); sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')){
    const item = SHOP_ITEMS[gs.shopSel];
    if(hasItem(item.id)){
      sfxDeny(); // already owned
    } else if(gs.gold >= item.cost){
      gs.gold -= item.cost;
      gs.ownedItems.push(item.id);
      saveGame(); sfxWin();
    } else {
      sfxDeny(); // not enough gold
    }
  }
  if(hit('KeyX','Escape')){ gs.state='title'; }
}

function drawShop() {
  fr(0,0,W,H,'#000');
  cx.save(); cx.font="bold 20px 'Courier New',monospace"; cx.textAlign='center';
  const hue=gs.frame%360;
  cx.fillStyle=`hsl(${hue},100%,70%)`; cx.shadowBlur=12; cx.shadowColor=cx.fillStyle;
  cx.fillText('🛒  ITEM SHOP',W/2,28); cx.shadowBlur=0; cx.restore();
  tx(`Your gold: ${gs.gold} 💰`,W/2,46,'#ffd700',13,'center');
  tx('↑ ↓ navigate  |  Z/Enter buy  |  X/Esc back',W/2,60,'#444',10,'center');

  const itemH=44, visStart=68, visH=H-visStart-6;
  const maxVis=Math.floor(visH/itemH);
  const scrollOff=Math.max(0,Math.min(gs.shopSel-Math.floor(maxVis/2), SHOP_ITEMS.length-maxVis));

  for(let vi=0;vi<Math.min(maxVis,SHOP_ITEMS.length);vi++){
    const i=vi+scrollOff;

function updTitle() {
  const n = 7; // UNDERTALE / SPACE MARINES / DIFFICULTY GAUNTLET / OBBY RUN / SHOP / ENTER CODE / SKIN SHOP
  if(hit('ArrowUp','KeyW'))   { gs.titleSel=(gs.titleSel-1+n)%n; sfxSelect(); }
  if(hit('ArrowDown','KeyS')) { gs.titleSel=(gs.titleSel+1)%n;   sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')) {
    sfxConfirm();
    if(gs.titleSel===0) {
      gs.campaign='u'; gs.state='select'; gs.menuSel=0;
    } else if(gs.titleSel===1) {
      gs.campaign='s'; gs.state='select'; gs.menuSel=0;
    } else if(gs.titleSel===2) {
      gs.campaign='d'; gs.state='select'; gs.menuSel=0;
    } else if(gs.titleSel===3) {
      if(gs.beaten_u[1] || gs.obbyUnlocked[1]) {
        gs.state='obby_select'; gs.obbyMenuSel=0;
      } else {
        sfxDeny();
      }
    } else if(gs.titleSel===4) {
      gs.state='shop'; gs.shopSel=0;
    } else if(gs.titleSel===6) {
      gs.state='skinshop'; gs.skinSel=0;
    } else {
      showCodeOverlay();
    }
  }
}
function updSelect() {
  if(hit('ArrowUp','KeyW')){ gs.menuSel=Math.max(0,gs.menuSel-1); sfxSelect(); }
  if(hit('ArrowDown','KeyS')){ gs.menuSel=Math.min(bossArr().length-1,gs.menuSel+1); sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')){
    if(ulk()[gs.menuSel]){ sfxConfirm(); startFight(gs.menuSel); }
    else sfxDeny();
  }
  if(hit('KeyX','Escape')){ gs.state='title'; }
}
function updCutscene() {
  gs.dTimer++;
  const line=gs.dLines[gs.dLine]||'';
  const shown=Math.min(line.length,Math.floor(gs.dTimer/1.4));
  if(hit('KeyZ','Enter')||hit('Space')){
    if(shown<line.length){ gs.dTimer=line.length*1.5+5; }
    else {
      gs.dLine++;
      gs.dTimer=0;
      if(gs.dLine>=gs.dLines.length){
        const cb=gs.dCB; gs.dCB=null;
        if(cb) cb();
      } else tone(440,0.04,'square',0.05);
    }
  }
}
function updEnemy() {
  const box=gs.box, spd=3.1;
  let dx=0,dy=0;
  if(dn('ArrowLeft','KeyA'))  dx-=spd;
  if(dn('ArrowRight','KeyD')) dx+=spd;
  if(dn('ArrowUp','KeyW'))    dy-=spd;
  if(dn('ArrowDown','KeyS'))  dy+=spd;
  if(gs.reversed){dx=-dx;dy=-dy;}
  gs.px=Math.max(box.x+5,Math.min(box.x+box.w-5,gs.px+dx));
  gs.py=Math.max(box.y+5,Math.min(box.y+box.h-5,gs.py+dy));
  if(gs.invTimer>0) gs.invTimer--;
  if(gs.flashbangTimer>0){ gs.flashbangTimer--; gs.flashA=1.0; }
  // Slow time: skip every 3rd frame of attack logic so spawns are also slower
  const skipAtk = gs.slowTimer > 0 && gs.frame % 3 !== 0;
  if(!skipAtk){ const atk=AT[gs.attackName]; if(atk) atk(); }
  updateProjs();
  gs.shakeX*=0.75; gs.shakeY*=0.75;
  if(gs.flashbangTimer<=0&&gs.flashA>0) gs.flashA=Math.max(0,gs.flashA-0.025);
  gs.attackTimer--;
  if(gs.attackTimer<=0) startPlayerTurn();
}
function updPlayer() {
  const hasSlowAvail = hasItem('slowtime') && !gs.slowUsed;
  const menuN = hasSlowAvail ? 5 : 4;
  if(hit('ArrowLeft','KeyA')||hit('ArrowUp','KeyW')){ gs.menuSel=(gs.menuSel-1+menuN)%menuN; sfxSelect(); }
  if(hit('ArrowRight','KeyD')||hit('ArrowDown','KeyS')){ gs.menuSel=(gs.menuSel+1)%menuN; sfxSelect(); }
  if(hit('KeyZ','Enter')||hit('Space')){
    sfxConfirm();
    if(gs.menuSel===0){ startSlider(); }
    else if(gs.menuSel===1){ dialogue(['* You try talking.','* ...','* They aren\'t interested.'],startEnemyTurn); }
    else if(gs.menuSel===2){
      if(gs.items>0){
        const healAmt = hasItem('godmode')||hasItem('mightyheal') ? 50 : 30;
        gs.items--; gs.php=Math.min(gs.pMaxHP,gs.php+healAmt);
        dialogue([`* You used a healing item! (+${healAmt} HP)`,`* HP: ${gs.php}/${gs.pMaxHP}`],startEnemyTurn);
      } else dialogue(['* No items left!'],startEnemyTurn);
    } else if(gs.menuSel===3 && hasSlowAvail){
      gs.slowUsed = true; gs.slowTimer = 900; // 15s at 60fps
      flash(0.4); tone(300,0.5,'sine',0.2);
      dialogue(['* Time Crystal activated!','* Everything slows down...','* 15 seconds of slow time!'],startEnemyTurn);
    } else { dialogue(['* You offer mercy.','* The enemy ignores you.'],startEnemyTurn); }
  }
}
function updSlider() {
  if(!gs.sliderLocked){
    gs.sliderX+=gs.sliderDir*(gs.sliderSpd/60);
    if(gs.sliderX>=1){gs.sliderX=1;gs.sliderDir=-1;}
    if(gs.sliderX<=0){gs.sliderX=0;gs.sliderDir=1;}
    if(hit('KeyZ','Enter')||hit('Space')) confirmSlider();
  } else {
    gs.sliderShowTimer--;
    if(gs.sliderShowTimer<=0) applySliderDamage();
  }
}
function updResult() {
  gs.resultTimer--;
  if(gs.resultTimer<=0||(hit('KeyZ','Enter')||hit('Space'))){
    const total=gs.boss.isDouble?(gs.bossHP+gs.bossHP2):gs.bossHP;
    if(total>0) startEnemyTurn();
  }
}
function updBossDead() {
  gs.dTimer++;
  const lines=gs.boss.dw||['* ...'];
  const line=lines[gs.dLine]||'';
  const shown=Math.min(line.length,Math.floor(gs.dTimer/1.4));
  if(hit('KeyZ','Enter')||hit('Space')){
    if(shown<line.length){ gs.dTimer=line.length*2; }
    else if(gs.dLine<lines.length-1){ gs.dLine++; gs.dTimer=0; }
    else {
      if(btn().every(b=>b)){ gs.state='win'; sfxWin(); }
      else { gs.state='select'; gs.menuSel=0; }
    }
  }
}
function updDead() {
  gs.deathTimer--;
  gs.shakeX*=0.9; gs.shakeY*=0.9; gs.flashA=Math.max(0,gs.flashA-0.02);
  if(hit('KeyR')){ startFight(gs.bossIdx); return; }
  if(gs.deathTimer<80&&(hit('KeyZ','Enter')||hit('Space'))){ gs.state='select'; gs.menuSel=gs.bossIdx; }
  if(gs.deathTimer<80&&hit('Escape','KeyX')){ gs.state='title'; }
}
function updWin() {
  if(hit('KeyZ','Enter')||hit('Space')||hit('Escape','KeyX')){
    gs.state='title';
  }
}

// ---- MUSIC (multi-section, ~2 min loops) -------------------------
let _mPlaying=false, _mId=0, _mTrack=null;

// Note frequency table
const _N=(()=>{
  const nm=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'],t={};
  for(let o=2;o<=6;o++) for(let i=0;i<12;i++) t[nm[i]+o]=440*Math.pow(2,((o+1)*12+i-69)/12);
  return t;
})();

let _mComp=null;
function _getComp(){
  if(_mComp) return _mComp;
  const ctx=ac(), c=ctx.createDynamicsCompressor();
  c.threshold.value=-18; c.knee.value=10; c.ratio.value=4;
  c.attack.value=0.003; c.release.value=0.15;
  c.connect(ctx.destination); _mComp=c; return c;
}
// Master gain — all synths connect here; set to 0 on stopMusic to kill pre-scheduled notes
let _mMasterGain=null;
function _getMix(){
  if(_mMasterGain) return _mMasterGain;
  const ctx=ac(), g=ctx.createGain(); g.gain.value=1;
  g.connect(_getComp()); _mMasterGain=g; return g;
}

// Lead synth: 3 detuned square oscillators + lowpass (fat chorus)
function _mLead(freq,t,dur,vol){
  if(!freq||dur<=0.01) return;
  const ctx=ac(), dest=_getMix();
  const mg=ctx.createGain();
  mg.gain.setValueAtTime(0.001,t);
  mg.gain.linearRampToValueAtTime(vol,t+Math.min(0.015,dur*0.1));
  mg.gain.setValueAtTime(vol,t+dur*0.72);
  mg.gain.exponentialRampToValueAtTime(0.001,t+dur*0.97);
  const filt=ctx.createBiquadFilter();
  filt.type='lowpass'; filt.frequency.value=2200; filt.Q.value=0.8;
  filt.connect(mg); mg.connect(dest);
  for(const dc of[-8,0,8]){
    const o=ctx.createOscillator();
    o.type='square'; o.frequency.value=freq; o.detune.value=dc;
    o.connect(filt); o.start(t); o.stop(t+dur*0.97);
  }
}
// Bass synth: sawtooth+lowpass + sub-octave sine
function _mBass(freq,t,dur,vol){
  if(!freq||dur<=0.01) return;
  const ctx=ac(), dest=_getMix();
  const mg=ctx.createGain();
  mg.gain.setValueAtTime(0.001,t); mg.gain.linearRampToValueAtTime(vol,t+0.025);
  mg.gain.setValueAtTime(vol,t+dur*0.65); mg.gain.exponentialRampToValueAtTime(0.001,t+dur*0.92);
  mg.connect(dest);
  const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=900; filt.Q.value=0.5; filt.connect(mg);
  const saw=ctx.createOscillator(); saw.type='sawtooth'; saw.frequency.value=freq;
  saw.connect(filt); saw.start(t); saw.stop(t+dur*0.93);
  const sub=ctx.createOscillator(); sub.type='sine'; sub.frequency.value=freq/2;
  const sg=ctx.createGain(); sg.gain.value=0.5; sub.connect(sg); sg.connect(mg);
  sub.start(t); sub.stop(t+dur*0.93);
}
// Kick drum: pitched sine sweep + click
function _mKick(t){
  const ctx=ac(), dest=_getMix();
  const g=ctx.createGain(); g.gain.setValueAtTime(0.95,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.42); g.connect(dest);
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(155,t); o.frequency.exponentialRampToValueAtTime(40,t+0.15);
  o.connect(g); o.start(t); o.stop(t+0.42);
  const cg=ctx.createGain(); cg.gain.setValueAtTime(0.6,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.018); cg.connect(dest);
  const co=ctx.createOscillator(); co.type='square'; co.frequency.value=200;
  co.connect(cg); co.start(t); co.stop(t+0.018);
}
// Snare: noise burst + tone body
function _mSnare(t){
  const ctx=ac(), dest=_getComp(), sr=ctx.sampleRate;
  const len=Math.floor(sr*0.18), buf=ctx.createBuffer(1,len,sr), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource(); src.buffer=buf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1800;
  const g=ctx.createGain(); g.gain.setValueAtTime(0.8,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  src.connect(hp); hp.connect(g); g.connect(dest); src.start(t); src.stop(t+0.18);
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=185;
  const og=ctx.createGain(); og.gain.setValueAtTime(0.35,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.07);
  o.connect(og); og.connect(dest); o.start(t); o.stop(t+0.07);
}
// Hi-hat: filtered noise
function _mHat(t,vol=0.2){
  const ctx=ac(), dest=_getComp(), sr=ctx.sampleRate;
  const len=Math.floor(sr*0.055), buf=ctx.createBuffer(1,len,sr), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource(); src.buffer=buf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
  const g=ctx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.055);
  src.connect(hp); hp.connect(g); g.connect(dest); src.start(t); src.stop(t+0.055);
}
// Soft pad chord (title ambience)
function _mPad(freqs,t,dur,vol){
  if(!freqs.length||dur<=0.6) return;
  const ctx=ac(), dest=_getMix();
  const mg=ctx.createGain();
  mg.gain.setValueAtTime(0.001,t); mg.gain.linearRampToValueAtTime(vol,t+0.28);
  mg.gain.setValueAtTime(vol,t+dur-0.5); mg.gain.linearRampToValueAtTime(0.001,t+dur);
  const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1400; filt.connect(mg); mg.connect(dest);
  for(const f of freqs){ const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(filt); o.start(t); o.stop(t+dur); }
}

// ---- SCHEDULING HELPERS ------------------------------------------
// Schedule melody [[noteName,dur],...], 'R'=rest, return total duration
function _mel(arr,t0,vol){
  let t=t0,d=0; for(const [n,v] of arr){ if(n!=='R'&&_N[n]) _mLead(_N[n],t,v*0.82,vol); t+=v; d+=v; } return d;
}
// Schedule bass [[noteName,dur],...]
function _bas(arr,t0,vol){ let t=t0; for(const [n,v] of arr){ if(_N[n]) _mBass(_N[n],t,v*0.8,vol); t+=v; } }
// Rock drums 120 BPM, n bars (barDur=2s)
function _dk120(t0,n){ for(let b=0;b<n;b++){ const tb=t0+b*2; _mKick(tb);_mHat(tb);_mHat(tb+0.25); _mSnare(tb+0.5);_mHat(tb+0.5);_mHat(tb+0.75); _mKick(tb+1);_mHat(tb+1);_mHat(tb+1.25); _mSnare(tb+1.5);_mHat(tb+1.5);_mHat(tb+1.75); } }
// March drums 120 BPM (double kick on 1), n bars
function _dkM(t0,n){ for(let b=0;b<n;b++){ const tb=t0+b*2; _mKick(tb);_mKick(tb+0.125);_mHat(tb);_mHat(tb+0.25); _mSnare(tb+0.5);_mHat(tb+0.5);_mHat(tb+0.75); _mKick(tb+1);_mHat(tb+1);_mHat(tb+1.25); _mSnare(tb+1.5);_mHat(tb+1.5);_mHat(tb+1.75); } }
// Double-kick drums 160 BPM (barDur=1.5s), n bars
function _dk160(t0,n){ for(let b=0;b<n;b++){ const tb=t0+b*1.5,e=0.1875,q=0.375; _mKick(tb);_mKick(tb+e);_mSnare(tb+q);_mKick(tb+0.75);_mKick(tb+0.75+e);_mSnare(tb+0.75+q); for(let i=0;i<8;i++) _mHat(tb+i*e,0.15); } }

// ---- TRACK PLAYER — one song at a time, sections in sequence -----
// Sections play in order then loop the whole list. _mId ensures
// only one track ever plays; stopMusic() kills it instantly.
function _playTrack(sections){
  _mPlaying=true; ac();
  const id=++_mId; let si=0;
  function next(t0){
    if(!_mPlaying||_mId!==id) return;
    const dur=sections[si++%sections.length](t0);
    setTimeout(()=>next(ac().currentTime+0.05),(dur-0.2)*1000);
  }
  next(ac().currentTime+0.05);
}
function startMusic(){
  if(_mPlaying) return;
  _mTrack='title'; _playTrack(_TITLE);
}
function startBattleMusic(){
  stopMusic(); _mTrack='battle';
  if(gs.campaign==='s')      _playTrack(_S_SONG);
  else if(gs.campaign==='d') _playTrack(_D_SONG);
  else                        _playTrack(_U_SONG);
}
function stopMusic(){
  _mPlaying=false; _mId++; _mTrack=null;
  // Instantly silence all pre-scheduled notes by zeroing master gain
  if(_mMasterGain) _mMasterGain.gain.setValueAtTime(0, AC ? AC.currentTime : 0);
  _mMasterGain=null; // next song gets a fresh gain=1 node
}
function startObbyMusic(){ stopMusic(); _mTrack='obby'; _playTrack(_O_SONG); }

// ---- MAIN LOOP --------------------------------------------------
let _wasTitleState = false;
function loop() {
  update(); draw();
  // Show/hide real HTML title menu in sync with game state
  const isTitle = gs.state==='title';
  if(isTitle && !_wasTitleState){ stopMusic(); showTitleMenu(); }
  else if(!isTitle && _wasTitleState) hideTitleMenu();
  _wasTitleState = isTitle;
  requestAnimationFrame(loop);
}

// ---- MOBILE / TOUCH CONTROLS ------------------------------------
// On-screen buttons → same keys/jp as keyboard
document.querySelectorAll('[data-key]').forEach(btn => {
  const code = btn.dataset.key;
  function press(e) {
    e.preventDefault();
    if (!keys[code]) jp[code] = true;
    keys[code] = true;
    btn.classList.add('held');
  }
  function release(e) {
    if (e) e.preventDefault();
    keys[code] = false;
    btn.classList.remove('held');
  }
  btn.addEventListener('mousedown',  press,   {passive:false});
  btn.addEventListener('mouseup',    release, {passive:false});
  btn.addEventListener('mouseleave', release, {passive:false});
  btn.addEventListener('touchstart', press,   {passive:false});
  btn.addEventListener('touchend',   release, {passive:false});
  btn.addEventListener('touchcancel',release, {passive:false});
});

// Convert screen click/touch coords to canvas coords (handles CSS scaling)
function canvasXY(e) {
  const rect = cv.getBoundingClientRect();
  const sx = 600 / rect.width, sy = 520 / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left)*sx, (src.clientY - rect.top)*sy];
}

function handleCanvasTap(e) {
  e.preventDefault();
  const [cx_, cy_] = canvasXY(e);

  if (gs.state === 'title') {
    // Hit-test each title menu button
    const startY=90, itemH=66, btnH=58, bx_=140, bw_=320;
    if (cx_ >= bx_ && cx_ <= bx_+bw_) {
      for (let i=0; i<6; i++) {
        const by_ = startY + i*itemH;
        if (cy_ >= by_ && cy_ <= by_+btnH) {
          gs.titleSel = i;
          jp['KeyZ'] = true;
          return;
        }
      }
    }
  } else if (gs.state === 'select') {
    // Hit-test visible boss list entries
    const arr = bossArr();
    const itemH=38, visStart=66, visH=520-visStart-8;
    const maxVis = Math.floor(visH/itemH);
    const scrollOff = Math.max(0, Math.min(gs.menuSel - Math.floor(maxVis/2), arr.length-maxVis));
    if (cx_ >= 30 && cx_ <= 570) {
      for (let vi=0; vi<maxVis; vi++) {
        const i = vi+scrollOff;
        if (i>=arr.length) break;
        const by_ = visStart + vi*itemH;
        if (cy_ >= by_ && cy_ <= by_+itemH-2) {
          if (gs.menuSel === i) { jp['KeyZ']=true; }
          else { gs.menuSel = i; }
          return;
        }
      }
    }
  } else if (gs.state === 'shop') {
    // Hit-test visible shop items
    const itemH=44, visStart=68, visH=520-visStart-6;
    const maxVis = Math.floor(visH/itemH);
    const scrollOff = Math.max(0, Math.min(gs.shopSel - Math.floor(maxVis/2), SHOP_ITEMS.length-maxVis));
    if (cx_ >= 14 && cx_ <= 586) {
      for (let vi=0; vi<maxVis; vi++) {
        const i = vi+scrollOff;
        if (i>=SHOP_ITEMS.length) break;
        const by_ = visStart + vi*itemH;
        if (cy_ >= by_ && cy_ <= by_+itemH-2) {
          if (gs.shopSel === i) { jp['KeyZ']=true; }
          else { gs.shopSel = i; }
          return;
        }
      }
    }
  } else {
    // Any other screen: tap = confirm (advance dialogue, etc.)
    jp['KeyZ'] = true;
  }
}

cv.addEventListener('pointerdown', handleCanvasTap, {passive:false});

// Scale canvas visually to fit narrow screens while keeping 600×520 logic
function resizeCanvas() {
  const wrap = document.getElementById('wrap');
  const maxW = Math.min(window.innerWidth, 600);
  wrap.style.maxWidth = maxW + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---- CODE OVERLAY -----------------------------------------------
function unlockAll() {
  gs.unlocked_u = gs.unlocked_u.map(()=>true);
  gs.unlocked_s = gs.unlocked_s.map(()=>true);
  gs.unlocked_d = gs.unlocked_d.map(()=>true);
  saveGame();
  sfxWin();
}

function submitCode() {
  const overlay = document.getElementById('codeOverlay');
  const input   = document.getElementById('codeInput');
  const msg     = document.getElementById('codeMsg');
  const code = input.value.trim();
  if (code === '123') {
    unlockAll();
    msg.style.color = '#00ff88';
    msg.textContent = '✓ ALL BOSSES UNLOCKED!';
    setTimeout(()=>{ overlay.classList.remove('active'); }, 1400);
  } else if (code === '321') {
    gs.obbyUnlocked = Array(15).fill(true);
    gs.beaten_u[1] = true;
    saveGame(); sfxWin();
    msg.style.color = '#ff88ff';
    msg.textContent = '✓ ALL OBBY LEVELS UNLOCKED!';
    setTimeout(()=>{ overlay.classList.remove('active'); }, 1400);
  } else if (code === '260641') {
    for (const item of SHOP_ITEMS) {
      if (item.cost < 300 && !gs.ownedItems.includes(item.id)) {
        gs.ownedItems.push(item.id);
      }
    }
    saveGame(); sfxWin();
    msg.style.color = '#ffd700';
    msg.textContent = '✓ CHEAP SHOP ITEMS UNLOCKED!';
    setTimeout(()=>{ overlay.classList.remove('active'); }, 1400);
  } else {
    msg.style.color = '#ff4444';
    msg.textContent = '✗ Wrong code. Try again.';
    input.value = '';
  }
}
function showCodeOverlay() {
  const overlay = document.getElementById('codeOverlay');
  const input   = document.getElementById('codeInput');
  const msg     = document.getElementById('codeMsg');
  input.value = ''; msg.textContent = ''; msg.style.color = '#ff4444';
  overlay.classList.add('active');
  setTimeout(()=>input.focus(), 80);
}

// ---- INIT -------------------------------------------------------
loadGame();
requestAnimationFrame(loop);
</script>
