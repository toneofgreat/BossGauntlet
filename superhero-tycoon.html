<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Superhero Tycoon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#fff;font-family:'Courier New',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#ui{display:flex;gap:0;flex:1;overflow:hidden}
#game-area{flex:1;position:relative;overflow:hidden}
canvas#world{display:block;width:100%;height:100%}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;display:flex;justify-content:space-between;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.hud-stat{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;text-shadow:0 1px 4px #000}
.hud-cash{color:#ffe066}
.hud-power{color:#66aaff}
.hud-wave{color:#ff6666}

/* Sidebar */
#sidebar{width:260px;background:#0d0d1a;border-left:2px solid #1a1a2e;display:flex;flex-direction:column;overflow:hidden}
#tab-bar{display:flex;background:#070710}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;border-bottom:3px solid transparent;transition:.15s;color:#666}
.tab.active{color:#fff;border-color:#4466ff}
#tab-content{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:#1a1a2e #070710}
#tab-content::-webkit-scrollbar{width:4px}
#tab-content::-webkit-scrollbar-thumb{background:#1a1a2e}

/* Buildings */
.build-card{background:#1a1a2e;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:2px solid #222;transition:.15s;cursor:pointer}
.build-card:hover:not(.locked){border-color:#4466ff;background:#1e2040}
.build-card.locked{opacity:.5;cursor:not-allowed}
.build-card.owned{border-color:#22aa44}
.build-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.build-icon{font-size:22px;width:34px;text-align:center}
.build-name{font-size:13px;font-weight:700}
.build-level{font-size:10px;color:#66aaff;margin-left:auto}
.build-desc{font-size:10px;color:#666;margin-bottom:6px;line-height:1.4}
.build-stats{display:flex;justify-content:space-between;align-items:center}
.build-income{font-size:11px;color:#ffe066}
.build-cost{font-size:12px;font-weight:700}
.build-cost.afford{color:#4ade80}
.build-cost.cant{color:#ff4444}
.build-btn{background:#4466ff;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.build-btn:hover{background:#5577ff}
.build-btn:disabled{background:#333;cursor:not-allowed}

/* Heroes */
.hero-card{background:#1a1a2e;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:2px solid #222;cursor:pointer;transition:.15s}
.hero-card:hover:not(.locked){border-color:#aa44ff}
.hero-card.locked{opacity:.5;cursor:not-allowed}
.hero-card.active{border-color:#ffcc00;background:#1e1a00}
.hero-card.owned:not(.active){border-color:#444488}
.hero-top{display:flex;align-items:center;gap:10px}
.hero-icon{font-size:28px;width:38px;text-align:center}
.hero-info{flex:1}
.hero-name{font-size:13px;font-weight:700}
.hero-power{font-size:10px;color:#aa88ff;margin-top:2px}
.hero-cost{font-size:12px;font-weight:700;margin-top:4px}
.hero-desc{font-size:10px;color:#666;margin-top:4px;line-height:1.3}
.hero-select{background:#ffcc00;color:#000;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.hero-select:hover{background:#ffd700}
.hero-select:disabled{background:#333;color:#666;cursor:not-allowed}

/* Enemy waves panel */
.wave-info{background:#1a1a2e;border-radius:8px;padding:12px;margin-bottom:8px}
.wave-title{font-size:12px;font-weight:700;color:#ff6666;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.enemy-list{display:flex;flex-direction:column;gap:4px}
.enemy-row{display:flex;align-items:center;gap:8px;font-size:11px}
.enemy-hp-bar{flex:1;height:6px;background:#222;border-radius:3px;overflow:hidden}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8800);border-radius:3px;transition:.3s}

/* Power bar */
#power-bar-wrap{position:absolute;bottom:12px;left:16px;right:16px;pointer-events:none}
#power-label{font-size:12px;font-weight:700;color:#66aaff;margin-bottom:4px;text-shadow:0 1px 4px #000}
#power-bar-bg{height:12px;background:rgba(0,0,0,.6);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
#power-bar-fill{height:100%;border-radius:6px;transition:.5s;background:linear-gradient(90deg,#4466ff,#aa44ff,#ff44aa)}

/* Click zone */
#click-zone{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);pointer-events:all;cursor:pointer;text-align:center;user-select:none}
#click-btn{background:rgba(68,102,255,.2);border:3px solid #4466ff;border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:32px;transition:.15s;box-shadow:0 0 20px rgba(68,102,255,.4)}
#click-btn:hover{transform:scale(1.08);box-shadow:0 0 30px rgba(68,102,255,.6)}
#click-btn:active{transform:scale(.94)}
#click-hint{font-size:10px;color:#4466ff;margin-top:4px;letter-spacing:1px}

/* Floating text */
.float-text{position:absolute;pointer-events:none;font-size:16px;font-weight:700;color:#ffe066;text-shadow:0 2px 6px rgba(0,0,0,.8);animation:floatUp .9s ease-out forwards;z-index:50}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* Notifications */
#notif{position:absolute;top:60px;left:50%;transform:translateX(-50%);pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center;z-index:100}
.notif-msg{background:rgba(0,0,0,.85);border:2px solid #4466ff;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;letter-spacing:1px;animation:notifIn .3s ease-out;white-space:nowrap}
@keyframes notifIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* Prestige btn */
#prestige-btn{background:linear-gradient(135deg,#ffe066,#ff6644);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;margin-top:4px;letter-spacing:1px}
#prestige-btn:hover{filter:brightness(1.1)}
#prestige-btn:disabled{background:#333;color:#666;cursor:not-allowed}
</style>
</head>
<body>

<div id="ui">
  <div id="game-area">
    <canvas id="world"></canvas>
    <div id="hud">
      <div class="hud-stat hud-cash">💰 <span id="cashDisplay">$0</span></div>
      <div class="hud-stat hud-power">⚡ Power: <span id="powerDisplay">0</span></div>
      <div class="hud-stat hud-wave">👿 Wave <span id="waveDisplay">1</span></div>
    </div>
    <div id="click-zone">
      <div id="click-btn" onclick="manualClick()">⚡</div>
      <div id="click-hint">CLICK TO EARN</div>
    </div>
    <div id="power-bar-wrap">
      <div id="power-label">HERO POWER: 0 / 100</div>
      <div id="power-bar-bg"><div id="power-bar-fill" style="width:0%"></div></div>
    </div>
    <div id="notif"></div>
  </div>

  <div id="sidebar">
    <div id="tab-bar">
      <div class="tab active" onclick="switchTab('buildings',this)">BUILD</div>
      <div class="tab" onclick="switchTab('heroes',this)">HEROES</div>
      <div class="tab" onclick="switchTab('waves',this)">WAVES</div>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<script>
const PI=Math.PI,sin=Math.sin,cos=Math.cos,rand=Math.random;

// ---- State ----
const S={
  cash:0, totalEarned:0, power:0, wave:1, waveHP:100, waveMaxHP:100,
  cps:0, // cash per second from buildings
  clickVal:1,
  prestige:0,
  heroes:{},      // owned + active
  activeHero:'',
  buildings:{},   // {id: level}
};

const BUILDINGS=[
  {id:'lab',name:'Science Lab',icon:'🔬',desc:'Researches hero tech. Passive income.',base:15,inc:8,cost:50,growth:1.6},
  {id:'dojo',name:'Hero Dojo',icon:'🥋',desc:'Trains heroes. Boosts click power.',base:10,inc:5,cost:120,growth:1.7,clickMul:0.5},
  {id:'hangar',name:'Suit Hangar',icon:'✈️',desc:'Stores hero suits. Big passive income.',base:40,inc:25,cost:400,growth:1.65},
  {id:'reactor',name:'Arc Reactor',icon:'⚛️',desc:'Powers all buildings. Multiplies income.',base:0,inc:0,mult:1.5,cost:1200,growth:1.8},
  {id:'hq',name:'Hero HQ',icon:'🏙️',desc:'Central command. Massive passive income.',base:120,inc:80,cost:4000,growth:1.7},
  {id:'fortress',name:'Sky Fortress',icon:'🛸',desc:'Orbital platform. Ultimate income source.',base:500,inc:350,cost:20000,growth:1.75},
];

const HEROES=[
  {id:'rookie',name:'Rookie Hero',icon:'🦸',power:10,bonus:'2x click',cost:0,desc:'Every hero starts somewhere.',owned:true},
  {id:'speedster',name:'Speedster',icon:'⚡',power:30,bonus:'3x click',cost:500,desc:'Fastest hero alive. Triple click power.'},
  {id:'titan',name:'Iron Titan',icon:'🦾',power:60,bonus:'2x passive',cost:2000,desc:'Armored powerhouse. Doubles all building income.'},
  {id:'sorcerer',name:'Sorcerer',icon:'🔮',power:100,bonus:'3x passive',cost:8000,desc:'Mystic arts master. Triples all passive income.'},
  {id:'cosmic',name:'Cosmic Hero',icon:'🌌',power:150,bonus:'5x all',cost:30000,desc:'Powered by the cosmos. Quintuples everything.'},
  {id:'omega',name:'Omega Supreme',icon:'💥',power:250,bonus:'10x all',cost:150000,desc:'Reality-breaking power. 10x all income.'},
];

// Load save
(function(){
  const raw=localStorage.getItem('superheroTycoon_save');
  if(!raw) return;
  try{
    const d=JSON.parse(raw);
    Object.assign(S,d);
    if(!S.heroes) S.heroes={};
    if(!S.buildings) S.buildings={};
  } catch(e){}
})();

// Ensure rookie is always owned
if(!S.heroes['rookie']) S.heroes['rookie']={owned:true,active:false};
if(!S.activeHero) S.activeHero='rookie';

function save(){
  localStorage.setItem('superheroTycoon_save',JSON.stringify({
    cash:S.cash,totalEarned:S.totalEarned,power:S.power,wave:S.wave,
    prestige:S.prestige,heroes:S.heroes,buildings:S.buildings,activeHero:S.activeHero,
  }));
}

function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function getBuildingCPS(){
  let cps=0;
  const mult=getPassiveMult();
  BUILDINGS.forEach(b=>{
    const lvl=(S.buildings[b.id]||0);
    if(lvl>0 && b.base!==undefined && b.inc!==undefined){
      cps+=(b.base + b.inc*(lvl-1))*lvl * mult;
    }
  });
  return cps;
}

function getPassiveMult(){
  let m=1;
  if(S.buildings['reactor']) m*=Math.pow(1.5,S.buildings['reactor']);
  const hero=HEROES.find(h=>h.id===S.activeHero);
  if(hero){
    if(hero.id==='titan') m*=2;
    if(hero.id==='sorcerer') m*=3;
    if(hero.id==='cosmic') m*=5;
    if(hero.id==='omega') m*=10;
  }
  return m*(1+S.prestige*0.5);
}

function getClickVal(){
  let v=1;
  BUILDINGS.forEach(b=>{
    const lvl=(S.buildings[b.id]||0);
    if(lvl>0 && b.clickMul) v+=b.clickMul*lvl;
  });
  const hero=HEROES.find(h=>h.id===S.activeHero);
  if(hero){
    if(hero.id==='speedster') v*=3;
    if(hero.id==='cosmic') v*=5;
    if(hero.id==='omega') v*=10;
  }
  return v*(1+S.prestige*0.5);
}

function getBuildCost(b){
  const lvl=S.buildings[b.id]||0;
  return Math.floor(b.cost * Math.pow(b.growth, lvl));
}

function manualClick(){
  const val=getClickVal();
  earn(val);
  S.power=Math.min(S.power+0.5,999999);
  // Float text
  const zone=document.getElementById('click-zone');
  const ft=document.createElement('div');
  ft.className='float-text';
  ft.textContent='+$'+fmt(val);
  ft.style.left=(80+rand()*40-20)+'px';
  ft.style.bottom='100px';
  zone.appendChild(ft);
  setTimeout(()=>ft.remove(),900);
}

function earn(amt){
  S.cash+=amt;
  S.totalEarned+=amt;
}

function notify(msg, color='#66aaff'){
  const n=document.getElementById('notif');
  const el=document.createElement('div');
  el.className='notif-msg';
  el.style.borderColor=color;
  el.textContent=msg;
  n.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// ---- Tabs ----
let currentTab='buildings';
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSidebar();
}

function renderSidebar(){
  const tc=document.getElementById('tab-content');
  tc.innerHTML='';
  if(currentTab==='buildings') renderBuildings(tc);
  else if(currentTab==='heroes') renderHeroes(tc);
  else renderWaves(tc);
}

function renderBuildings(tc){
  const cps=getBuildingCPS();
  const info=document.createElement('div');
  info.style.cssText='background:#070710;border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:#888;display:flex;justify-content:space-between';
  info.innerHTML=`<span>Passive: <b style="color:#ffe066">$${fmt(cps)}/s</b></span><span>Click: <b style="color:#66aaff">$${fmt(getClickVal())}</b></span>`;
  tc.appendChild(info);

  BUILDINGS.forEach(b=>{
    const lvl=S.buildings[b.id]||0;
    const cost=getBuildCost(b);
    const card=document.createElement('div');
    card.className='build-card'+(lvl>0?' owned':'');
    const income=b.base!==undefined&&b.inc!==undefined ? `+$${fmt((b.base+b.inc*lvl)*(lvl+1))}/s` : `×${b.mult} multiplier`;
    card.innerHTML=`
      <div class="build-top">
        <span class="build-icon">${b.icon}</span>
        <span class="build-name">${b.name}</span>
        <span class="build-level">${lvl>0?'Lv.'+lvl:''}</span>
      </div>
      <div class="build-desc">${b.desc}</div>
      <div class="build-stats">
        <span class="build-income">${income}</span>
        <span><span class="build-cost ${S.cash>=cost?'afford':'cant'}">$${fmt(cost)}</span>
        <button class="build-btn" ${S.cash<cost?'disabled':''} onclick="buyBuilding('${b.id}')">
          ${lvl===0?'BUILD':'UPGRADE'}
        </button></span>
      </div>
    `;
    tc.appendChild(card);
  });

  // Prestige
  const prestigeCost=Math.pow(10,6+S.prestige)*50;
  const pb=document.createElement('button');
  pb.id='prestige-btn';
  pb.disabled=S.totalEarned<prestigeCost;
  pb.textContent=`⚡ PRESTIGE (Need $${fmt(prestigeCost)}) +50% all`;
  pb.onclick=doPrestige;
  const pw=document.createElement('div');
  pw.style.padding='4px 0 8px';
  pw.appendChild(pb);
  tc.appendChild(pw);
}

function buyBuilding(id){
  const b=BUILDINGS.find(x=>x.id===id);
  const cost=getBuildCost(b);
  if(S.cash<cost){notify('Not enough cash!','#ff4444');return;}
  S.cash-=cost;
  S.buildings[id]=(S.buildings[id]||0)+1;
  S.power+=b.id==='fortress'?50:10;
  notify(`${b.icon} ${b.name} ${S.buildings[id]===1?'built':'upgraded to Lv.'+S.buildings[id]}!`,'#4ade80');
  save();
  renderSidebar();
}

function doPrestige(){
  const cost=Math.pow(10,6+S.prestige)*50;
  if(S.totalEarned<cost) return;
  S.prestige++;
  S.cash=0;S.totalEarned=0;
  S.buildings={};
  notify(`⚡ PRESTIGE ${S.prestige}! All income x${1+S.prestige*0.5}!`,'#ffe066');
  save();renderSidebar();
}

function renderHeroes(tc){
  HEROES.forEach(h=>{
    const owned=h.owned||(S.heroes[h.id]?.owned);
    const active=S.activeHero===h.id;
    const card=document.createElement('div');
    card.className='hero-card'+(active?' active':owned?' owned':S.cash<h.cost?' locked':'');
    const hero=HEROES.find(x=>x.id===h.id);
    card.innerHTML=`
      <div class="hero-top">
        <span class="hero-icon">${h.icon}</span>
        <div class="hero-info">
          <div class="hero-name">${h.name} ${active?'<span style="color:#ffcc00">▶ ACTIVE</span>':''}</div>
          <div class="hero-power">⚡ Power: ${h.power} | ${h.bonus}</div>
          ${!owned?`<div class="hero-cost" style="color:${S.cash>=h.cost?'#4ade80':'#ff4444'}">Cost: $${fmt(h.cost)}</div>`:''}
        </div>
      </div>
      <div class="hero-desc">${h.desc}</div>
      <button class="hero-select"
        ${active?'disabled':''}
        onclick="${owned?`selectHero('${h.id}')`:`buyHero('${h.id}')`}">
        ${active?'ACTIVE':owned?'SELECT':'BUY'}
      </button>
    `;
    tc.appendChild(card);
  });
}

function buyHero(id){
  const h=HEROES.find(x=>x.id===id);
  if(S.cash<h.cost){notify('Not enough cash!','#ff4444');return;}
  S.cash-=h.cost;
  if(!S.heroes[id]) S.heroes[id]={};
  S.heroes[id].owned=true;
  S.power+=h.power;
  notify(`${h.icon} ${h.name} unlocked!`,'#aa44ff');
  selectHero(id);
  save();renderSidebar();
}

function selectHero(id){
  S.activeHero=id;
  const h=HEROES.find(x=>x.id===id);
  notify(`${h.icon} ${h.name} activated! ${h.bonus}`,'#ffcc00');
  document.getElementById('click-btn').textContent=h.icon;
  save();renderSidebar();
}

function renderWaves(tc){
  const waveEnemies=getWaveEnemies();
  const wi=document.createElement('div');
  wi.className='wave-info';
  wi.innerHTML=`<div class="wave-title">👿 Wave ${S.wave} — ${getWaveName()}</div>`;
  const el=document.createElement('div');
  el.className='enemy-list';
  waveEnemies.forEach((e,i)=>{
    const pct=Math.max(0,(e.hp/e.maxHP)*100);
    const row=document.createElement('div');
    row.className='enemy-row';
    row.innerHTML=`<span style="width:20px">${e.icon}</span><span style="flex:1;font-size:10px">${e.name}</span>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="ehp${i}" style="width:${pct}%"></div></div>
      <span style="width:30px;text-align:right;font-size:10px">${Math.floor(pct)}%</span>`;
    el.appendChild(row);
  });
  wi.appendChild(el);
  tc.appendChild(wi);

  // Attack button
  const atk=document.createElement('button');
  atk.style.cssText='background:#ff4444;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;letter-spacing:1px';
  atk.textContent=`⚔️ ATTACK! (Power: ${Math.floor(S.power)})`;
  atk.onclick=attackWave;
  tc.appendChild(atk);

  const info=document.createElement('div');
  info.style.cssText='font-size:10px;color:#666;text-align:center;line-height:1.6';
  info.textContent=`Defeat enemies to earn bonus cash and advance waves!\nCurrent wave reward: $${fmt(getWaveReward())}`;
  tc.appendChild(info);
}

let waveEnemiesState=null;
function getWaveEnemies(){
  if(!waveEnemiesState || waveEnemiesState.wave!==S.wave){
    const base=S.wave;
    waveEnemiesState={wave:S.wave,enemies:[
      {icon:'👹',name:'Villain Grunt',hp:base*30,maxHP:base*30},
      {icon:'🤖',name:'Mech Soldier',hp:base*60,maxHP:base*60},
      {icon:'🦹',name:'Super Villain',hp:base*100,maxHP:base*100},
    ]};
  }
  return waveEnemiesState.enemies;
}

function getWaveName(){
  const names=['City Streets','Villain HQ','Nuclear Plant','Sky Fortress','Space Station','Dark Dimension','Multiverse Rift'];
  return names[Math.min(S.wave-1,names.length-1)];
}

function getWaveReward(){return Math.floor(100*Math.pow(1.4,S.wave-1));}

function attackWave(){
  const enemies=getWaveEnemies();
  const dmg=Math.max(1,S.power/3);
  let allDead=true;
  enemies.forEach((e,i)=>{
    e.hp=Math.max(0,e.hp-dmg*(1+rand()*0.5));
    if(e.hp>0) allDead=false;
  });
  if(allDead){
    const reward=getWaveReward();
    earn(reward);
    S.wave++;
    waveEnemiesState=null;
    notify(`🎉 Wave ${S.wave-1} cleared! +$${fmt(reward)}`,'#4ade80');
    S.power=Math.min(S.power*0.5,999999);
    save();
  }
  renderSidebar();
}

// ---- World Canvas ----
const wc=document.getElementById('world');
const wctx=wc.getContext('2d');
let t=0;
const particles=[];
const BUILDINGS_3D=[
  {x:0.15,y:0.45,w:0.08,h:0.4,col:'#1a2a4a',window:'#66aaff'},
  {x:0.25,y:0.35,w:0.07,h:0.5,col:'#2a1a3a',window:'#aa66ff'},
  {x:0.35,y:0.25,w:0.1,h:0.6,col:'#1a3a1a',window:'#66ff88'},
  {x:0.55,y:0.2,w:0.12,h:0.65,col:'#3a1a1a',window:'#ff6666'},
  {x:0.68,y:0.3,w:0.08,h:0.55,col:'#2a2a1a',window:'#ffcc44'},
  {x:0.78,y:0.4,w:0.09,h:0.45,col:'#1a2a3a',window:'#44ccff'},
];

function drawWorld(){
  const W=wc.width,H=wc.height;
  t+=0.016;

  // Sky gradient
  const sky=wctx.createLinearGradient(0,0,0,H*0.7);
  sky.addColorStop(0,'#050510');
  sky.addColorStop(0.5,'#0a0a20');
  sky.addColorStop(1,'#1a0a1a');
  wctx.fillStyle=sky;wctx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<120;i++){
    const sx=(sin(i*137.5)*0.5+0.5)*W;
    const sy=(cos(i*97.3)*0.5+0.5)*H*0.65;
    const sa=0.4+0.6*Math.abs(sin(t*0.5+i));
    wctx.fillStyle=`rgba(255,255,255,${sa})`;
    wctx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
  }

  // Moon
  wctx.fillStyle='rgba(220,220,255,0.15)';
  wctx.beginPath();wctx.arc(W*0.8,H*0.12,40,0,PI*2);wctx.fill();
  wctx.fillStyle='rgba(200,210,255,0.6)';
  wctx.beginPath();wctx.arc(W*0.8,H*0.12,28,0,PI*2);wctx.fill();

  // Ground
  const gnd=wctx.createLinearGradient(0,H*0.65,0,H);
  gnd.addColorStop(0,'#0d0d1a');gnd.addColorStop(1,'#050508');
  wctx.fillStyle=gnd;wctx.fillRect(0,H*0.65,W,H*0.35);

  // Road
  wctx.fillStyle='#111118';
  wctx.fillRect(W*0.3,H*0.7,W*0.4,H*0.2);
  wctx.strokeStyle='#ffe066';wctx.lineWidth=2;wctx.setLineDash([20,20]);
  wctx.beginPath();wctx.moveTo(W*0.5,H*0.7);wctx.lineTo(W*0.5,H*0.9);wctx.stroke();
  wctx.setLineDash([]);

  // Buildings
  BUILDINGS_3D.forEach(b=>{
    const bx=b.x*W,bw=b.w*W,bh=b.h*H,by=H*0.7-bh;
    // Shadow
    wctx.fillStyle='rgba(0,0,0,0.4)';
    wctx.fillRect(bx+5,by+5,bw,bh);
    // Body
    wctx.fillStyle=b.col;
    wctx.fillRect(bx,by,bw,bh);
    // Windows
    const cols=Math.floor(bw/14);
    const rows=Math.floor(bh/16);
    for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
      const lit=sin(t*1.5+r*c*0.7+bx)*0.5+0.5;
      if(lit>0.3){
        wctx.fillStyle=b.window;
        wctx.globalAlpha=0.4+lit*0.5;
        wctx.fillRect(bx+4+c*14,by+8+r*16,8,10);
        wctx.globalAlpha=1;
      }
    }}
  });

  // Hero flying
  const heroData=HEROES.find(h=>h.id===S.activeHero)||HEROES[0];
  const hx=W*0.5+sin(t*0.6)*W*0.15;
  const hy=H*0.35+cos(t*0.4)*H*0.1;
  // Cape
  wctx.fillStyle='rgba(255,50,50,0.6)';
  wctx.beginPath();
  wctx.moveTo(hx,hy);
  wctx.lineTo(hx-20+sin(t*2)*8,hy+30);
  wctx.lineTo(hx-8,hy+15);
  wctx.closePath();wctx.fill();
  // Body
  wctx.fillStyle='#3355cc';
  wctx.fillRect(hx-8,hy-10,16,20);
  // Head
  wctx.fillStyle='#ffccaa';
  wctx.beginPath();wctx.arc(hx,hy-16,8,0,PI*2);wctx.fill();
  // Icon
  wctx.font='14px serif';wctx.textAlign='center';wctx.textBaseline='middle';
  wctx.fillText(heroData.icon,hx,hy-16);
  // Power glow
  const glowAlpha=0.1+sin(t*3)*0.05;
  const grd2=wctx.createRadialGradient(hx,hy,0,hx,hy,40);
  grd2.addColorStop(0,`rgba(68,102,255,${glowAlpha+0.1})`);
  grd2.addColorStop(1,'rgba(68,102,255,0)');
  wctx.fillStyle=grd2;wctx.beginPath();wctx.arc(hx,hy,40,0,PI*2);wctx.fill();

  // Particles (combat sparks)
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.03;
    if(p.life<=0){particles.splice(i,1);continue;}
    wctx.fillStyle=`hsla(${p.hue},90%,60%,${p.life})`;
    wctx.beginPath();wctx.arc(p.x,p.y,p.r*p.life,0,PI*2);wctx.fill();
  }

  // Enemies flying from right
  if(S.wave>0){
    for(let i=0;i<Math.min(S.wave,5);i++){
      const ex=W*(0.65+0.15*i+cos(t*0.4+i)*0.05)+(-t*20+i*100)%(W*0.6);
      const ey=H*(0.3+i*0.06+sin(t*0.5+i)*0.04);
      wctx.font='20px serif';wctx.textAlign='center';
      wctx.fillText(['👹','🤖','🦹','💀','😈'][i%5],ex,ey);
    }
  }

  // HUD update
  document.getElementById('cashDisplay').textContent='$'+fmt(S.cash);
  document.getElementById('powerDisplay').textContent=fmt(S.power);
  document.getElementById('waveDisplay').textContent=S.wave;
  const maxP=HEROES[HEROES.length-1].power;
  const pct=Math.min(100,(S.power/maxP)*100);
  document.getElementById('power-bar-fill').style.width=pct+'%';
  document.getElementById('power-label').textContent=`HERO POWER: ${fmt(S.power)} / ${fmt(maxP)}`;

  requestAnimationFrame(drawWorld);
}

function resizeCanvas(){
  const ga=document.getElementById('game-area');
  wc.width=ga.offsetWidth;
  wc.height=ga.offsetHeight;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
drawWorld();

// Passive income tick
setInterval(()=>{
  const cps=getBuildingCPS();
  if(cps>0){
    earn(cps/10);
    if(rand()<0.05){
      const ga=document.getElementById('game-area');
      particles.push({
        x:ga.offsetWidth*(0.3+rand()*0.4),
        y:ga.offsetHeight*(0.3+rand()*0.3),
        vx:(rand()-.5)*3,vy:-2-rand()*2,
        life:1,r:3+rand()*4,hue:50+rand()*30,
      });
    }
  }
},100);

// Auto-save every 10s
setInterval(save,10000);

// Initial render
renderSidebar();
</script>
</body>
</html>
